<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindMatch — 方向验证实验</title>
  <meta name="description" content="AI 帮你设计可执行的验证实验，让你在现实中确认自己的职业方向。">
  <script>window.__MM_VER__ = '20260602e';</script>
  <link rel="stylesheet" href="css/base.css?v=20260602e">
  <link rel="stylesheet" href="css/components.css?v=20260602e">
  <link rel="stylesheet" href="css/match.css?v=20260602e">
</head>
<body class="page-match">

  <!-- ========== Top Bar ========== -->
  <div class="match-topbar">
    <a href="results.html" class="btn-back">← 返回肖像</a>
  </div>

  <!-- ========== Hero ========== -->
  <section class="match-hero">
    <h1>方向验证实验</h1>
    <div class="match-mode-tabs" id="modeTabs">
      <button class="match-mode-tab active" data-mode="experiment">验证实验</button>
      <button class="match-mode-tab" data-mode="extended">职业方向</button>
    </div>
    <p class="match-subtitle">AI 帮你设计可执行的验证实验，让你在现实中确认自己的方向</p>
  </section>

  <!-- ========== Content ========== -->
  <div class="match-content" id="matchContent">
    <div class="match-loading">
      <div class="spinner"></div>
      <p>正在分析你的思维特质...</p>
    </div>
  </div>

  <!-- ========== Bottom Bar ========== -->
  <div class="match-bottom">
    <a href="results.html" class="btn-secondary">← 返回肖像</a>
    <a href="index.html" class="btn-secondary">返回首页</a>
  </div>

  <!-- ========== App Script ========== -->
  <script type="module">
    import { integrate } from './js/layers/integrator.js?v=20260602e';
    import { matchExtended } from './js/layers/matcher.js?v=20260602e';
    import { renderDirectionResults } from './js/ui/match-ui-extended.js?v=20260602e';
    import { load } from './js/core/store.js?v=20260602e';
    import { extractBehaviorNarrative, formatBehaviorNarrative } from './js/layers/behavior-narrative.js?v=20260602e';
    import { translate } from './js/layers/translator.js?v=20260602e';
    import { generateExperiments, hasExperimentCache } from './js/layers/experiment.js?v=20260602e';
    import { renderExperimentButton, renderExperimentLoading, renderExperimentResult, renderExperimentError } from './js/ui/experiment-card.js?v=20260602e';

    async function init() {
      const content = document.getElementById('matchContent');
      const params = new URLSearchParams(location.search);
      const mode = params.get('mode') || 'experiment';

      try {
        const profile = integrate();
        const count = profile.meta.completedCount;

        if (count < 4) {
          content.innerHTML = `
            <div class="match-empty">
              <div class="match-empty-icon">🔒</div>
              <h3>还没准备好</h3>
              <p>需要完成全部 4 个思维游戏才能进行方向验证。<br>当前已完成 <strong>${count}/4</strong>，请先完成剩余游戏。</p>
            </div>
          `;
          return;
        }

        // 4/4 → 加载匹配引擎
        const resp = await fetch('./mock/ideal-profiles.json?v=20260602e');
        if (!resp.ok) throw new Error(`加载数据失败 (HTTP ${resp.status})`);
        const data = await resp.json();

        if (mode === 'extended') {
          // ---- 职业方向 Tab（原 extended 模式，保持不变） ----
          if (!data.directions || Object.keys(data.directions).length === 0) {
            throw new Error('缺少方向数据');
          }

          document.title = 'MindMatch — 职业方向匹配';
          const hero = document.querySelector('.match-hero h1');
          if (hero) hero.textContent = '职业方向匹配';
          const subtitle = document.querySelector('.match-hero .match-subtitle');
          if (subtitle) subtitle.textContent = '基于你的思维肖像，探索最适合你的六大职业方向';
          document.querySelectorAll('.match-mode-tab').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === 'extended');
          });

          const report = matchExtended(profile, data);
          renderDirectionResults('matchContent', report);
        } else {
          // ---- 验证实验 Tab（默认） ----
          if (!data.directions || Object.keys(data.directions).length === 0) {
            throw new Error('缺少方向数据');
          }

          document.title = 'MindMatch — 方向验证实验';
          const hero = document.querySelector('.match-hero h1');
          if (hero) hero.textContent = '方向验证实验';
          const subtitle = document.querySelector('.match-hero .match-subtitle');
          if (subtitle) subtitle.textContent = 'AI 帮你设计可执行的验证实验，让你在现实中确认自己的方向';
          document.querySelectorAll('.match-mode-tab').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === 'experiment');
          });

          // 计算方向匹配
          const matchResult = matchExtended(profile, data);
          const directionRanking = matchResult && matchResult.directionRanking ? matchResult.directionRanking : [];

          // 行为叙事
          const rawData = { game1: load('game1'), game2: load('game2'), game3: load('game3'), game4: load('game4') };
          const bn = extractBehaviorNarrative(rawData);
          const bnText = formatBehaviorNarrative(bn);

          // 翻译
          const translation = translate(profile);
          const transText = translation && translation.sections
            ? translation.sections.map(s => `【${s.gameName || s.gameId}】${s.summary || ''}`).join('\n')
            : '';

          // 检查缓存，如果有则直接渲染结果
          if (hasExperimentCache(profile, directionRanking)) {
            const result = await generateExperiments(profile, directionRanking, transText, bnText);
            if (result) {
              renderExperimentResult('matchContent', result);
              return;
            }
          }

          // 渲染按钮
          async function handleExperimentGenerate(btn) {
            if (btn) btn.disabled = true;
            renderExperimentLoading('matchContent');

            try {
              const result = await generateExperiments(profile, directionRanking, transText, bnText);
              if (result) {
                renderExperimentResult('matchContent', result);
              } else {
                renderExperimentError('matchContent', 'AI 调用失败，请稍后重试', () => {
                  renderExperimentButton('matchContent', handleExperimentGenerate);
                });
              }
            } catch (err) {
              renderExperimentError('matchContent', err.message, () => {
                renderExperimentButton('matchContent', handleExperimentGenerate);
              });
            }
          }

          renderExperimentButton('matchContent', handleExperimentGenerate);
        }
      } catch (err) {
        console.error('[MindMatch] 匹配失败:', err);
        content.innerHTML = `
          <div class="match-empty">
            <div class="match-empty-icon">⚠️</div>
            <h3>匹配引擎加载失败</h3>
            <p>${err.message || '请返回结果页刷新后重试'}</p>
          </div>
        `;
      }
    }

    // 模式切换按钮事件
    document.getElementById('modeTabs').addEventListener('click', (e) => {
      const btn = e.target.closest('.match-mode-tab');
      if (!btn) return;
      const targetMode = btn.dataset.mode;
      const currentMode = new URLSearchParams(location.search).get('mode') || 'experiment';
      if (targetMode === currentMode) return;
      const url = new URL(location);
      if (targetMode === 'experiment') {
        url.searchParams.delete('mode');
      } else {
        url.searchParams.set('mode', targetMode);
      }
      location.href = url.toString();
    });

    init();
  </script>

</body>
</html>
