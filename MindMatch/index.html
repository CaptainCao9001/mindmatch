<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="4 个轻量小游戏，不考知识，不测对错。从你的每一次取舍中，还原你真正在意的东西。">

  <link rel="stylesheet" href="css/base.css?v=20260603g">
  <link rel="stylesheet" href="css/components.css?v=20260603g">
  <link rel="stylesheet" href="css/index.css?v=20260603g">
</head>
<body style="margin:0;background:#0d0d12;">

<!-- Demo 提示 -->
<div style="
  width:100%;padding:8px;text-align:center;
  background:hsla(48,100%,50%,0.13);
  border-bottom:1px solid hsla(48,100%,50%,0.25);
  color:hsl(48,100%,52%);
  font-size:14px;
  font-weight:500;
  letter-spacing:.03em;
  font-family:system-ui,-apple-system,sans-serif;
">🛠 开发中 Demo · 结果仅供体验参考，不构成专业建议</div>

<main class="page-landing">

  <!-- ========== Hero ========== -->
  <section class="hero">
    <h1 class="hero__brand">Mind<span>Match</span></h1>
    <p class="hero__tagline">认识自己，从一次取舍开始</p>

    <div class="hero__intro">
      4 个轻量小游戏，不考知识，不测对错。<br>
      从你的每一次取舍中，还原你真正在意的东西。
    </div>

    <div class="hero__time">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      预计 10–15 分钟
    </div>
  </section>

  <!-- ========== Progress Overview ========== -->
  <nav class="progress-overview" aria-label="游戏完成进度">
    <!-- 由 JS 动态渲染 -->
  </nav>

  <!-- ========== Game Cards ========== -->
  <div class="game-grid" id="gameGrid">
    <!-- 由 JS 动态渲染 -->
  </div>

  <!-- ========== Results CTA ========== -->
  <div class="results-cta" id="resultsCta" style="display: none;">
    <a href="results.html" class="results-cta__btn">
      查看我的思维肖像
      <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
  </div>

  <!-- ========== Career Guide CTA ========== -->
  <div class="career-guide-cta" style="text-align:center;padding:var(--space-6) var(--space-4);max-width:600px;margin:0 auto;">
    <a href="career-guide.html" style="
      display:inline-flex;align-items:center;gap:8px;
      padding:12px 28px;
      background:linear-gradient(135deg,rgba(124,58,237,0.12),rgba(16,185,129,0.08));
      border:1px solid rgba(124,58,237,0.25);
      border-radius:12px;
      color:var(--color-text);
      font-size:15px;
      font-weight:500;
      text-decoration:none;
      transition:all .25s;
    " onmouseover="this.style.borderColor='rgba(124,58,237,0.5)';this.style.transform='translateY(-1px)'"
       onmouseout="this.style.borderColor='rgba(124,58,237,0.25)';this.style.transform='translateY(0)'">
      🧭 直接探索职业方向
      <svg viewBox="0 0 24 24" width="16" height="16"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    </a>
    <p style="color:var(--color-text-muted);font-size:12px;margin-top:8px;">不想做测评？直接和 AI 聊聊你的职业方向</p>
  </div>

  <!-- ========== Footer ========== -->
  <footer class="page-footer">
    <div class="page-footer__item">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      数据仅存于你的浏览器本地，不上传任何服务器
    </div>
    <div class="page-footer__item">
      <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      基于学术心理学框架设计（McClelland · Schein · Riding · Steger）
    </div>
  </footer>

</main>

<!-- ========== JS ========== -->
<script type="module">
import { completedCount, completedGames, load } from './js/core/store.js';

/* ---------- Game Config ---------- */
const GAMES = [
  {
    id: 'game1',
    key: 'game1',
    file: 'games/game1-core-drive.html',
    number: 'G1',
    title: '核心驱动力',
    subtitle: '你的动力来源',
    description: '你为什么做事',
    time: '3–5 分钟',
  },
  {
    id: 'game2',
    key: 'game2',
    file: 'games/game2-career-anchor.html',
    number: 'G2',
    title: '不可放弃的锚点',
    subtitle: '你最无法妥协的是什么',
    description: '放弃才扣分的反向博弈',
    time: '3–5 分钟',
  },
  {
    id: 'game3',
    key: 'game3',
    file: 'games/game3-cognitive-style.html',
    number: 'G3',
    title: '认知处理风格',
    subtitle: '你习惯怎么理解世界',
    description: '信息处理偏好测试',
    time: '约 3 分钟',
  },
  {
    id: 'game4',
    key: 'game4',
    file: 'games/game4-meaning-construction.html',
    number: 'G4',
    title: '意义建构取向',
    subtitle: '你在工作中寻找什么意义',
    description: '价值冲突下的真实选择',
    time: '约 3 分钟',
  },
];

/* ---------- SVG Icons ---------- */
const ICON_CHECK = '<svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>';
const ICON_ARROW = '<svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';

/* ---------- Render Progress Overview ---------- */
function renderProgress() {
  const count = completedCount();
  const completed = completedGames();
  const container = document.querySelector('.progress-overview');

  let html = '';
  GAMES.forEach((game, i) => {
    const isDone = completed.includes(game.key);
    const isNext = !isDone && (i === 0 || completed.includes(GAMES[i - 1].key));
    const dotClass = isDone ? 'progress-dot--completed' : isNext ? 'progress-dot--current' : '';

    html += `<span class="progress-dot ${dotClass}" aria-label="${game.number} ${isDone ? '已完成' : isNext ? '当前' : '未开始'}">${isDone ? '✓' : game.number.replace('G', '')}</span>`;

    if (i < GAMES.length - 1) {
      const connDone = completed.includes(GAMES[i].key);
      html += `<span class="progress-connector ${connDone ? 'progress-connector--filled' : ''}"></span>`;
    }
  });

  html += `<span class="progress-count">${count}/4</span>`;
  container.innerHTML = html;
}

/* ---------- Render Game Cards ---------- */
function renderCards() {
  const count = completedCount();
  const completed = completedGames();
  const grid = document.getElementById('gameGrid');

  let html = '';
  GAMES.forEach((game, i) => {
    const isDone = completed.includes(game.key);
    const isFirstUndone = !isDone && completed.length === i;
    const cardClass = isDone ? 'game-card--completed' : '';

    // Badge text & class
    let badgeClass, badgeText, badgeIcon;
    if (isDone) {
      badgeClass = 'game-card__badge--completed';
      badgeText = '已完成';
      badgeIcon = ICON_CHECK;
    } else if (isFirstUndone) {
      badgeClass = 'game-card__badge--recommended';
      badgeText = '从这里开始';
      badgeIcon = ICON_ARROW;
    } else {
      badgeClass = 'game-card__badge--start';
      badgeText = '开始';
      badgeIcon = ICON_ARROW;
    }

    html += `
      <a href="${game.file}" class="game-card ${cardClass}" tabindex="0" aria-label="${game.title}：${game.description}，${isDone ? '已完成' : '未完成'}">
        <span class="game-card__number">${game.number}</span>
        <h2 class="game-card__title">${game.title}</h2>
        <p class="game-card__subtitle">${game.subtitle}</p>
        <span class="game-card__time">${game.time}</span>
        <span class="game-card__badge ${badgeClass}">
          ${badgeIcon}
          ${badgeText}
        </span>
      </a>
    `;
  });

  grid.innerHTML = html;
}

/* ---------- Render Results CTA ---------- */
function renderResultsCta() {
  const count = completedCount();
  const cta = document.getElementById('resultsCta');
  if (count === 0) {
    cta.style.display = 'none';
    return;
  }
  cta.style.display = '';
  const btnText = count === 4
    ? '查看我的思维肖像'
    : `查看已有结果（${count}/4）`;
  cta.querySelector('.results-cta__btn').innerHTML = `
    ${btnText}
    <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  `;
}

/* ---------- Init ---------- */
function init() {
  renderProgress();
  renderCards();
  renderResultsCta();
}

init();
</script>

</body>
</html>
