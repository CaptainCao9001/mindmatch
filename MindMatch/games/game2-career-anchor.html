<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时光回溯 — MindMatch</title>
<script>window.__MM_VER__ = '20260601l';</script>
<link rel="stylesheet" href="../css/base.css?v=20260603b">
<link rel="stylesheet" href="../css/components.css?v=20260603b">
<link rel="stylesheet" href="../css/games.css?v=20260603b">
<style>
/* ============================================================
 * G2 校园黄昏主题
 *   背景       → 夕阳渐变 + 树影轮廓 + 暖色光斑
 *   引导页      → 布告栏质感
 *   阶段一卡片  → 社团传单（泛黄纸张 + 图钉感）
 *   阶段二表格  → 课桌便签
 *   阶段三拍立得→ 黄昏光线增强
 *   反馈/完成页 → 金色余晖
 * ============================================================ */

/* ---------- 全局背景 ---------- */
body {
  background: hsl(32, 42%, 4.5%);
  background-image:
    /* 夕阳主光 — 右下暖橙光晕 */
    radial-gradient(ellipse 55vw 50vh at 75% 85%, hsla(28,70%,35%,0.32) 0%, transparent 60%),
    radial-gradient(ellipse 45vw 38vh at 65% 78%, hsla(32,75%,42%,0.22) 0%, transparent 55%),
    /* 天空过渡 — 左上淡蓝紫微光 */
    radial-gradient(ellipse 40vw 30vh at 15% 8%, hsla(210,40%,18%,0.25) 0%, transparent 55%),
    /* 中层暖光 */
    radial-gradient(ellipse 50vw 35vh at 50% 50%, hsla(33,40%,22%,0.15) 0%, transparent 60%);
  position: relative;
  overflow-x: hidden;
}

/* 树影轮廓层 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    /* 树冠剪影 — 用径向渐变 + 椭圆模拟 */
    radial-gradient(ellipse 120px 160px at 8% 92%, hsla(30,20%,3%,0.55), transparent),
    radial-gradient(ellipse 90px 140px at 6% 88%, hsla(28,18%,4%,0.5), transparent),
    radial-gradient(ellipse 80px 120px at 14% 94%, hsla(25,18%,4%,0.45), transparent),
    radial-gradient(ellipse 140px 180px at 22% 96%, hsla(30,22%,3%,0.55), transparent),
    radial-gradient(ellipse 100px 130px at 20% 90%, hsla(28,20%,4%,0.5), transparent),
    radial-gradient(ellipse 60px 100px at 30% 95%, hsla(25,18%,4%,0.4), transparent),
    radial-gradient(ellipse 110px 150px at 40% 94%, hsla(30,20%,3%,0.5), transparent),
    /* 右侧树 */
    radial-gradient(ellipse 130px 170px at 88% 93%, hsla(28,20%,3%,0.55), transparent),
    radial-gradient(ellipse 100px 130px at 85% 89%, hsla(30,18%,4%,0.5), transparent),
    radial-gradient(ellipse 70px 110px at 92% 95%, hsla(25,18%,4%,0.4), transparent),
    radial-gradient(ellipse 80px 120px at 78% 92%, hsla(28,22%,3%,0.48), transparent),
    radial-gradient(ellipse 50px 90px at 96% 94%, hsla(30,16%,4%,0.35), transparent);
}

/* 暖色光斑 — 树叶间透过的光 */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(3px 3px at 12% 24%, hsla(42,90%,68%,0.4), transparent),
    radial-gradient(2px 2px at 28% 16%, hsla(38,85%,72%,0.35), transparent),
    radial-gradient(4px 4px at 45% 10%, hsla(40,95%,70%,0.3), transparent),
    radial-gradient(2.5px 2.5px at 58% 22%, hsla(42,88%,68%,0.38), transparent),
    radial-gradient(1.5px 1.5px at 68% 14%, hsla(38,82%,74%,0.32), transparent),
    radial-gradient(3px 3px at 82% 20%, hsla(40,90%,66%,0.35), transparent),
    radial-gradient(2px 2px at 35% 30%, hsla(42,85%,70%,0.28), transparent),
    radial-gradient(1.8px 1.8px at 52% 18%, hsla(38,90%,72%,0.3), transparent),
    radial-gradient(2.2px 2.2px at 18% 28%, hsla(40,88%,68%,0.25), transparent),
    radial-gradient(3.5px 3.5px at 75% 26%, hsla(42,92%,70%,0.32), transparent);
  animation: g2-bokeh-drift 20s ease-in-out infinite alternate;
}
@keyframes g2-bokeh-drift {
  0%   { transform: translateY(0) scale(1); opacity: 0.5; }
  100% { transform: translateY(-12px) scale(1.04); opacity: 0.7; }
}

.game-container { position: relative; z-index: 1; }

/* ============================================================
 * 引导页 — 布告栏
 * ============================================================ */
.g2-intro {
  text-align: center;
  padding: var(--space-16) var(--space-4);
}
.g2-intro__subtitle {
  color: hsla(38,35%,58%,0.75);
  font-size: var(--text-xs);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: var(--space-2);
}
.g2-intro__title {
  font-size: var(--text-4xl);
  font-weight: 700;
  margin: var(--space-3) 0 var(--space-4);
  background: linear-gradient(135deg, hsl(38,60%,58%), hsl(30,50%,68%));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.g2-intro__desc {
  color: hsla(35,22%,72%,0.85);
  max-width: 480px;
  margin: 0 auto var(--space-6);
  line-height: 1.75;
  font-size: var(--text-sm);
}
.g2-intro__time {
  color: hsla(36,18%,52%,0.6);
  font-size: var(--text-sm);
  margin-bottom: var(--space-8);
}

/* 三阶段预览区 */
.g2-intro__stages {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-3);
  max-width: 680px;
  margin: 0 auto var(--space-6);
  text-align: left;
}
.g2-intro__stage-card {
  background: hsla(34,28%,10%,0.48);
  border: 1px solid hsla(36,28%,28%,0.32);
  border-radius: var(--radius-md);
  padding: var(--space-4);
  backdrop-filter: blur(4px);
}
.g2-intro__stage-top {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-2);
}
.g2-intro__stage-icon {
  font-size: 1.2rem;
  flex-shrink: 0;
}
.g2-intro__stage-num {
  display: block;
  font-size: 0.68rem;
  color: hsla(36,18%,48%,0.6);
  letter-spacing: 0.06em;
  margin-bottom: 2px;
}
.g2-intro__stage-name {
  display: block;
  font-size: var(--text-sm);
  font-weight: 600;
  color: hsla(38,30%,76%,0.92);
}
.g2-intro__stage-sub {
  font-size: 0.7rem;
  color: hsla(36,20%,54%,0.6);
  margin: 0 0 var(--space-2);
  line-height: 1.4;
}
.g2-intro__stage-desc {
  font-size: var(--text-xs);
  color: hsla(35,18%,62%,0.72);
  line-height: 1.6;
  margin: 0;
}

/* 开始按钮 — 金色暖光 */
.g2-intro__cta {
  background: linear-gradient(180deg, hsla(36,65%,34%,0.82), hsla(28,55%,20%,0.88));
  border: 1px solid hsla(36,50%,44%,0.5);
  color: hsl(40,65%,76%);
  border-radius: var(--radius-md);
  padding: var(--space-4) var(--space-8);
  font-size: var(--text-lg);
  font-weight: 600;
  cursor: pointer;
  backdrop-filter: blur(8px);
  box-shadow:
    0 0 22px hsla(36,60%,40%,0.2),
    inset 0 1px 0 hsla(36,60%,55%,0.12);
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
.g2-intro__cta:hover:not(:disabled) {
  background: linear-gradient(180deg, hsla(36,70%,40%,0.9), hsla(28,60%,24%,0.92));
  border-color: hsla(36,60%,54%,0.68);
  box-shadow:
    0 0 32px hsla(36,65%,45%,0.35),
    0 0 56px hsla(36,55%,35%,0.14);
  transform: translateY(-1px);
  color: hsl(40,70%,84%);
}

/* ============================================================
 * 阶段共用 — 校园通知栏风格
 * ============================================================ */
.g2-stage { animation: g2-slideIn 0.45s cubic-bezier(0.22, 1, 0.36, 1); }
@keyframes g2-slideIn {
  from { opacity: 0; transform: translateY(20px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.g2-stage__header {
  text-align: center;
  margin-bottom: var(--space-6);
}
.g2-stage__badge {
  display: inline-block;
  padding: var(--space-1) var(--space-3);
  background: hsla(36,40%,28%,0.35);
  color: hsla(38,55%,62%,0.85);
  border: 1px solid hsla(36,35%,40%,0.3);
  border-radius: 999px;
  font-size: var(--text-xs);
  font-weight: 600;
  letter-spacing: 0.05em;
}
.g2-stage__title {
  font-size: var(--text-3xl);
  font-weight: 700;
  margin: var(--space-3) 0 var(--space-1);
  background: linear-gradient(135deg, hsla(38,50%,66%,0.95), hsla(32,45%,72%,0.9));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.g2-stage__subtitle {
  color: hsla(36,20%,58%,0.7);
  font-size: var(--text-sm);
}
.g2-stage__desc {
  text-align: center;
  color: hsla(35,20%,72%,0.82);
  max-width: 480px;
  margin: 0 auto var(--space-3);
  line-height: 1.7;
}
.g2-stage__hint {
  text-align: center;
  color: hsla(36,18%,55%,0.6);
  font-size: var(--text-sm);
  margin-bottom: var(--space-6);
}

/* 底部操作栏 — 夕阳色玻璃 */
.g2-stage__bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: var(--space-8);
  padding: var(--space-4);
  background: hsla(32,35%,10%,0.55);
  border: 1px solid hsla(36,30%,30%,0.35);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(8px);
}
.g2-stage__count {
  color: hsla(35,20%,68%,0.8);
  font-size: var(--text-sm);
}
.g2-stage__count strong {
  color: hsl(38,55%,62%);
  font-size: var(--text-lg);
}

/* 阶段栏按钮 — 统一暖色调 */
.g2-stage__bar .btn-primary,
.g2-stage__bar .btn {
  background: linear-gradient(180deg, hsla(36,60%,32%,0.8), hsla(28,50%,18%,0.85));
  border: 1px solid hsla(36,45%,40%,0.45);
  color: hsl(40,60%,76%);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-5);
  font-size: var(--text-sm);
  font-weight: 600;
  cursor: pointer;
  backdrop-filter: blur(6px);
  box-shadow: 0 0 16px hsla(36,55%,35%,0.18);
  transition: all 0.22s ease;
}
.g2-stage__bar .btn-primary:hover:not(:disabled),
.g2-stage__bar .btn:hover:not(:disabled) {
  background: linear-gradient(180deg, hsla(36,65%,38%,0.88), hsla(28,55%,22%,0.9));
  border-color: hsla(36,55%,50%,0.65);
  box-shadow: 0 0 24px hsla(36,60%,40%,0.28);
  color: hsl(40,65%,84%);
  transform: translateY(-1px);
}
.g2-stage__bar .btn:disabled,
.g2-stage__bar .btn-primary:disabled {
  background: hsla(30,20%,14%,0.45);
  border-color: hsla(30,15%,22%,0.25);
  color: hsla(30,12%,42%,0.4);
  box-shadow: none;
  transform: none;
}

/* ============================================================
 * 阶段一：左右分栏 — 社团列表 + 详情
 * ============================================================ */
.g2-split {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: var(--space-4);
  min-height: 420px;
  margin-bottom: var(--space-4);
}

/* 左侧列表 */
.g2-split__list {
  background: hsla(34,22%,10%,0.48);
  border: 1px solid hsla(36,22%,26%,0.32);
  border-radius: var(--radius-lg);
  padding: var(--space-2);
  overflow-y: auto;
  max-height: 520px;
  backdrop-filter: blur(4px);
}

.g2-club-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) var(--space-3);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  border: 1px solid transparent;
  outline: none;
  margin-bottom: 2px;
}
.g2-club-item:hover {
  background: hsla(36,28%,18%,0.5);
  border-color: hsla(36,28%,32%,0.35);
}
.g2-club-item:focus-visible {
  box-shadow: 0 0 0 2px hsla(36,55%,55%,0.5);
}
.g2-club-item--active {
  background: hsla(36,32%,18%,0.62);
  border-color: hsla(36,40%,38%,0.5);
}
.g2-club-item--joined {
  background: hsla(38,40%,16%,0.55);
}
.g2-club-item--joined .g2-club-item__name {
  color: hsl(38,55%,62%);
}
.g2-club-item__name {
  font-size: var(--text-sm);
  font-weight: 500;
  color: hsla(36,20%,72%,0.88);
  line-height: 1.4;
}
.g2-club-item__check {
  font-size: 0.72rem;
  font-weight: 800;
  color: hsl(38,70%,55%);
  opacity: 0;
  transform: scale(0);
  transition: all 0.2s;
  flex-shrink: 0;
  margin-left: var(--space-2);
}
.g2-club-item--joined .g2-club-item__check {
  opacity: 1;
  transform: scale(1);
}

/* 右侧详情面板 */
.g2-split__detail {
  background: hsla(34,25%,12%,0.52);
  border: 1px solid hsla(36,25%,26%,0.32);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
  display: flex;
  flex-direction: column;
  backdrop-filter: blur(4px);
  transition: border-color 0.3s;
}
.g2-split__detail.g2-detail--visible {
  border-color: hsla(36,35%,36%,0.45);
}
.g2-detail__placeholder {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: hsla(36,18%,48%,0.5);
  font-size: var(--text-sm);
}
.g2-detail__name {
  font-size: var(--text-xl);
  font-weight: 700;
  color: hsl(38,55%,62%);
  margin-bottom: var(--space-4);
  padding-bottom: var(--space-3);
  border-bottom: 1px solid hsla(36,22%,28%,0.35);
}
.g2-detail__text {
  color: hsla(35,20%,72%,0.85);
  font-size: var(--text-base);
  line-height: 1.8;
  flex: 1;
  margin-bottom: var(--space-5);
}
.g2-detail__join {
  align-self: flex-start;
  background: linear-gradient(180deg, hsla(36,58%,34%,0.78), hsla(28,48%,20%,0.82));
  border: 1px solid hsla(36,45%,42%,0.45);
  color: hsl(40,58%,74%);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-5);
  font-size: var(--text-sm);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 0 12px hsla(36,50%,35%,0.15);
}
.g2-detail__join:hover {
  background: linear-gradient(180deg, hsla(36,62%,40%,0.85), hsla(28,52%,24%,0.88));
  border-color: hsla(36,55%,50%,0.6);
  box-shadow: 0 0 18px hsla(36,55%,40%,0.25);
  color: hsl(40,62%,82%);
}

/* ============================================================
 * 阶段二：表格 — 课桌便签
 * ============================================================ */
.g2-table-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}
.g2-table-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4);
  padding: var(--space-4) var(--space-5);
  background: hsla(34,30%,10%,0.5);
  border: 1px solid hsla(36,28%,28%,0.35);
  border-radius: var(--radius-md);
  backdrop-filter: blur(4px);
  transition: all 0.35s ease;
}
.g2-table-row:hover {
  border-color: hsla(36,38%,38%,0.48);
  box-shadow: 0 2px 12px hsla(36,35%,15%,0.15);
}
.g2-table-row--dropped {
  opacity: 0.38;
  filter: sepia(0.6) brightness(0.65);
  border-color: hsla(30,15%,20%,0.2);
}
.g2-table-row__info { flex: 1; min-width: 0; }
.g2-table-row__name {
  font-weight: 600;
  font-size: var(--text-base);
  display: block;
  margin-bottom: var(--space-1);
  color: hsla(38,25%,80%,0.88);
}
.g2-table-row__detail {
  color: hsla(36,16%,52%,0.6);
  font-size: var(--text-xs);
  line-height: 1.4;
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.g2-table-row__phase2 {
  color: hsla(35,18%,65%,0.8);
  font-size: var(--text-sm);
  line-height: 1.7;
  display: block;
  margin-top: var(--space-2);
}
.g2-table-row__actions {
  display: flex;
  gap: var(--space-2);
  flex-shrink: 0;
}

/* 阶段二按钮 — 暖色调 */
.g2-btn-keep {
  background: linear-gradient(180deg, hsla(36,58%,34%,0.75), hsla(28,48%,20%,0.8));
  border: 1px solid hsla(36,45%,42%,0.4);
  color: hsl(40,58%,74%);
  border-radius: var(--radius-md);
  padding: var(--space-2) var(--space-4);
  font-size: var(--text-sm);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}
.g2-btn-keep:hover { opacity: 1 !important; background: linear-gradient(180deg, hsla(36,62%,40%,0.85), hsla(28,52%,24%,0.88)); border-color: hsla(36,55%,50%,0.55); }
.g2-btn-drop  {
  background: hsla(30,18%,16%,0.5);
  border: 1px solid hsla(30,14%,26%,0.3);
  color: hsla(30,15%,55%,0.7);
  border-radius: var(--radius-md);
  padding: var(--space-2) var(--space-4);
  font-size: var(--text-sm);
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}
.g2-btn-drop:hover { opacity: 1 !important; background: hsla(30,25%,20%,0.55); border-color: hsla(30,20%,32%,0.4); }

/* ============================================================
 * 阶段三：故事卡 — 黄昏光线增强（替换原拍立得）
 * ============================================================ */
.g2-polaroid-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: var(--space-4);
  padding: var(--space-2) 0;
}
.g2-polaroid {
  background: hsla(36,28%,86%,0.06);
  border: 1px solid hsla(36,30%,30%,0.35);
  border-radius: var(--radius-lg);
  padding: var(--space-4) var(--space-4) var(--space-5);
  cursor: pointer;
  outline: none;
  transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s, filter 0.5s;
  backdrop-filter: blur(4px);
  position: relative;
}
.g2-polaroid:hover {
  transform: scale(1.02) rotate(0deg) !important;
  border-color: hsla(36,40%,42%,0.55);
  box-shadow: 0 4px 20px hsla(36,40%,20%,0.22);
}
.g2-polaroid:focus-visible {
  box-shadow: 0 0 0 3px hsla(36,55%,55%,0.5);
}
.g2-polaroid--chosen {
  transform: scale(1.02) rotate(0deg) !important;
  border-color: hsla(38,72%,52%,0.75) !important;
  border-width: 2px;
  box-shadow:
    0 0 24px hsla(38,70%,45%,0.28),
    0 0 50px hsla(36,55%,32%,0.12);
}
.g2-polaroid:not(.g2-polaroid--chosen) {
  filter: brightness(0.72) sepia(0.25);
}
.g2-polaroid__label {
  font-size: var(--text-sm);
  font-weight: 600;
  color: hsl(38,50%,62%);
  margin-bottom: var(--space-2);
  display: block;
  padding-bottom: var(--space-2);
  border-bottom: 1px dashed hsla(36,22%,30%,0.35);
}
.g2-polaroid__story {
  font-size: var(--text-xs);
  color: hsla(35,20%,68%,0.82);
  line-height: 1.7;
  margin: 0;
}

/* ============================================================
 * 反馈弹窗 — 金色余晖
 * ============================================================ */
.feedback-overlay {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 50vh;
  padding: var(--space-8) var(--space-4);
}
.feedback-card {
  background: hsla(34,35%,10%,0.68);
  border: 1px solid hsla(36,32%,32%,0.38);
  border-radius: var(--radius-lg);
  padding: var(--space-8) var(--space-10);
  max-width: 500px;
  width: 100%;
  text-align: center;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 48px hsla(36,45%,18%,0.15);
}
.feedback-text {
  color: hsla(35,22%,72%,0.85);
  line-height: 1.75;
  font-size: var(--text-sm);
  margin-bottom: var(--space-6);
  white-space: pre-line;
}
.feedback-next {
  background: linear-gradient(180deg, hsla(36,58%,32%,0.75), hsla(28,48%,18%,0.82));
  border: 1px solid hsla(36,44%,38%,0.45);
  color: hsl(40,58%,72%);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-6);
  font-size: var(--text-sm);
  font-weight: 600;
  cursor: pointer;
  backdrop-filter: blur(6px);
  box-shadow: 0 0 16px hsla(36,55%,35%,0.16);
  transition: all 0.22s ease;
}
.feedback-next:hover:not(:disabled) {
  background: linear-gradient(180deg, hsla(36,64%,38%,0.85), hsla(28,54%,22%,0.88));
  border-color: hsla(36,54%,48%,0.6);
  box-shadow: 0 0 24px hsla(36,58%,38%,0.25);
  color: hsl(40,62%,80%);
}

/* ============================================================
 * 完成页 — 金色日落庆祝
 * ============================================================ */
.g2-completion {
  text-align: center;
  padding: var(--space-12) var(--space-4);
}
.g2-completion__icon {
  font-size: 3rem;
  margin-bottom: var(--space-4);
  filter: drop-shadow(0 0 12px hsla(36,55%,45%,0.3));
}
.g2-completion__title {
  font-size: var(--text-3xl);
  font-weight: 700;
  margin-bottom: var(--space-8);
  background: linear-gradient(135deg, hsl(38,55%,64%), hsl(32,45%,70%));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.g2-completion__anchors {
  display: flex;
  flex-direction: column;
  gap: var(--space-6);
  max-width: 500px;
  margin: 0 auto var(--space-8);
}
.g2-anchor {
  background: hsla(34,30%,10%,0.5);
  border-radius: var(--radius-lg);
  padding: var(--space-5) var(--space-6);
  text-align: left;
  backdrop-filter: blur(6px);
  border: 1px solid hsla(36,28%,30%,0.3);
}
.g2-anchor--primary {
  border-left: 4px solid hsl(38,55%,52%);
  box-shadow: 0 0 18px hsla(36,45%,25%,0.12);
}
.g2-anchor--secondary {
  border-left: 4px solid hsla(36,35%,44%,0.55);
  opacity: 0.88;
}
.g2-anchor__label {
  font-size: var(--text-xs);
  color: hsla(36,20%,54%,0.65);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.g2-anchor__name {
  font-size: var(--text-xl);
  font-weight: 700;
  display: block;
  margin: var(--space-2) 0;
  color: hsla(38,35%,82%,0.92);
}
.g2-anchor__text {
  color: hsla(35,18%,68%,0.78);
  font-size: var(--text-sm);
  line-height: 1.6;
  margin: 0;
}
.g2-completion__message {
  color: hsla(35,18%,68%,0.75);
  font-size: var(--text-base);
  white-space: pre-line;
  margin-bottom: var(--space-8);
}
.g2-completion__nav {
  display: flex;
  gap: var(--space-4);
  justify-content: center;
  flex-wrap: wrap;
}

/* 完成页按钮 — 暖金 */
.g2-completion__nav .btn-primary {
  background: linear-gradient(180deg, hsla(36,62%,38%,0.82), hsla(28,52%,20%,0.88));
  border: 1px solid hsla(36,52%,48%,0.5);
  color: hsl(40,62%,78%);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-6);
  font-weight: 600;
  text-decoration: none;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 20px hsla(36,55%,38%,0.2);
  transition: all 0.22s ease;
  display: inline-flex;
  align-items: center;
}
.g2-completion__nav .btn-primary:hover {
  box-shadow: 0 0 30px hsla(36,60%,42%,0.32);
  border-color: hsla(36,60%,56%,0.65);
  transform: translateY(-1px);
  color: hsl(40,66%,86%);
}
.g2-completion__nav .btn-secondary {
  background: hsla(34,28%,14%,0.5);
  border: 1px solid hsla(36,24%,30%,0.35);
  color: hsla(35,18%,68%,0.8);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-6);
  font-weight: 500;
  text-decoration: none;
  backdrop-filter: blur(6px);
  transition: all 0.22s ease;
  display: inline-flex;
  align-items: center;
}
.g2-completion__nav .btn-secondary:hover {
  background: hsla(34,32%,18%,0.55);
  border-color: hsla(36,30%,38%,0.45);
  color: hsla(35,22%,76%,0.9);
}

/* ============================================================
 * 阶段三过场动画 — 风化消失
 * ============================================================ */

/* --- Phase 1: UI 退场 (header/desc/hint/bar) --- */
.g2-stage--exiting .g2-stage__header,
.g2-stage--exiting .g2-stage__desc,
.g2-stage--exiting .g2-stage__hint,
.g2-stage--exiting .g2-stage__bar {
  animation: g2-ui-fadeout 0.55s ease-in forwards;
}
@keyframes g2-ui-fadeout {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(-12px); }
}

/* --- Phase 2: 未选中照片 — 从四周开始暗淡 --- */
.g2-polaroid--weathering {
  position: relative;
  overflow: hidden;
  /* 关闭 hover 缩放 */
  pointer-events: none;
}
.g2-polaroid--weathering::after {
  content: '';
  position: absolute;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  border-radius: 4px;
  background: radial-gradient(circle at 50% 50%, transparent 95%, hsla(30,22%,5%,0.15) 100%);
  animation: g2-edge-dim 1.4s ease-in forwards;
}
@keyframes g2-edge-dim {
  0%   { background: radial-gradient(circle at 50% 50%, transparent 95%, hsla(30,22%,5%,0.05) 100%); }
  40%  { background: radial-gradient(circle at 50% 50%, transparent 55%, hsla(30,22%,5%,0.45) 100%); }
  75%  { background: radial-gradient(circle at 50% 50%, transparent 20%, hsla(30,22%,5%,0.78) 100%); }
  100% { background: radial-gradient(circle at 50% 50%, transparent 0%, hsla(30,22%,5%,0.95) 100%); }
}

/* --- Phase 3: 风化崩解 --- */
.g2-polaroid--disintegrated {
  animation: g2-disintegrate 0.9s ease-in forwards;
  pointer-events: none;
}
@keyframes g2-disintegrate {
  0%   { opacity: 1; transform: scale(1); filter: blur(0) brightness(1); }
  30%  { opacity: 0.85; transform: scale(1.01); filter: blur(1px) brightness(0.8); }
  60%  { opacity: 0.35; transform: scale(0.94); filter: blur(3px) brightness(0.35) sepia(0.5); }
  100% { opacity: 0; transform: scale(0.85); filter: blur(6px) brightness(0.1) sepia(0.8); }
}

/* --- 选中照片：微微呼吸光晕 --- */
.g2-polaroid--kept {
  animation: g2-kept-glow 2s ease-in-out forwards;
  pointer-events: none;
}
@keyframes g2-kept-glow {
  0%   { box-shadow: 0 0 0 hsla(36,55%,52%,0); }
  30%  { box-shadow: 0 0 28px hsla(36,55%,52%,0.32), 0 0 50px hsla(36,45%,35%,0.12); }
  100% { box-shadow: 0 0 10px hsla(36,55%,48%,0.15), 0 0 24px hsla(36,40%,28%,0.06); }
}

/* ============================================================
 * 响应式
 * ============================================================ */
@media (max-width: 640px) {
  .g2-split {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
    min-height: auto;
  }
  .g2-split__list {
    max-height: 200px;
  }
  .g2-intro__stages { grid-template-columns: 1fr; }
  .g2-polaroid-grid { grid-template-columns: 1fr; gap: var(--space-3); }
  .feedback-card { padding: var(--space-6) var(--space-5); margin: 0 var(--space-3); }
}
</style>
</head>
<body>

<div class="game-container" id="js-game-root">
  <p style="text-align:center;color:var(--color-text-muted);padding:var(--space-12);">加载中...</p>
</div>

<script type="module">
// ============================================================
// G2 游戏页面（三阶段编排层）
// 不使用 engine.js — 三阶段批处理模式与 engine 的场景循环不兼容
// ============================================================

import { CARDS, DIMENSIONS, STAGES, STAGE_WEIGHTS, FEEDBACK_TEXT, GAME_CONFIG } from '../js/games/game2-data.js?v=20260603b';
import { DiscardStrategy } from '../js/games/strategies/discard.js?v=20260603b';
import { save } from '../js/core/store.js?v=20260603b';
import { normalize, clamp } from '../js/core/utils.js?v=20260603b';

// ---------- 编排器 ----------

async function run() {
  const root = document.getElementById('js-game-root');
  const startTime = performance.now();

  // Phase 0: 引导页
  await DiscardStrategy.renderIntro(root, GAME_CONFIG);

  // 状态
  let keptCards = [...CARDS.map(c => c.id)];
  const allDecisions = [];
  let stage1Kept = 0, stage2Kept = 0, stage3Kept = 0;

  // Phase 1: 阶段一 — 百团大战
  const stage1Cards = CARDS;
  const s1Result = await DiscardStrategy.renderStage1(root, stage1Cards, STAGES[0]);
  const s1Selected = s1Result.selected;
  const cardsViewed = s1Result.cardsViewed;
  keptCards = s1Selected;
  stage1Kept = s1Selected.length;
  // 记录决策
  CARDS.forEach(c => {
    allDecisions.push({ stage:1, cardId:c.id, action:s1Selected.includes(c.id)?'join':'pass', anchor:c.anchor });
  });

  // 反馈一
  await DiscardStrategy.renderFeedback(root, FEEDBACK_TEXT.stage1);

  // Phase 2: 阶段二 — 大三抉择
  const s2Selected = await DiscardStrategy.renderStage2(root, keptCards, CARDS, STAGES[1]);
  keptCards = s2Selected;
  stage2Kept = s2Selected.length;
  CARDS.forEach(c => {
    if (s1Selected.includes(c.id)) {
      allDecisions.push({ stage:2, cardId:c.id, action:s2Selected.includes(c.id)?'keep':'drop', anchor:c.anchor });
    }
  });

  // 反馈二
  await DiscardStrategy.renderFeedback(root, FEEDBACK_TEXT.stage2);

  // Phase 3: 阶段三 — 毕业拍立得
  const s3Selected = await DiscardStrategy.renderStage3(root, keptCards, CARDS, STAGES[2]);
  stage3Kept = s3Selected.length;
  CARDS.forEach(c => {
    if (s2Selected.includes(c.id)) {
      allDecisions.push({ stage:3, cardId:c.id, action:s3Selected.includes(c.id)?'select':'', anchor:c.anchor });
    }
  });

  // Phase 4: 计算得分
  const rawScores = {};
  DIMENSIONS.forEach(d => { rawScores[d] = 0; });

  // 阶段权重累加
  CARDS.forEach(card => {
    let stage = 0;
    if (s1Selected.includes(card.id)) stage = 0;
    if (s2Selected.includes(card.id)) stage = 1;
    if (s3Selected.includes(card.id)) stage = 2;
    if (!s1Selected.includes(card.id)) return; // 第一阶段就被排除的不计分

    rawScores[card.anchor] += STAGE_WEIGHTS[stage];
  });

  // 归一化到 0-10
  // 最大可能分: 权重1+2+3=6 (如果一个锚的两张卡都被选到最后)
  const dimensions = {};
  DIMENSIONS.forEach(dim => {
    dimensions[dim] = clamp(normalize(rawScores[dim], 0, 6) * 10, 0, 10);
  });

  // behaviorSummary
  const sorted = DIMENSIONS
    .map(d => ({ id:d, score:dimensions[d] }))
    .sort((a, b) => b.score - a.score);

  const output = {
    gameId: 'game2',
    version: '1.0.0',
    dimensions,
    behaviorSummary: {
      primaryAnchor: sorted[0].id,
      secondaryAnchor: sorted[1].id,
      bottomAnchor: sorted[7].id,
    },
    decisions: allDecisions,
    meta: {
      totalTime: Math.round(performance.now() - startTime),
      elapsedMs: Math.round(performance.now() - startTime),
      decisionCount: allDecisions.length,
      cardsViewed,
      stage1Kept,
      stage2Kept,
      stage3Kept,
      completedAt: Date.now(),
    },
  };

  // 保存
  try {
    save('game2', output);
    console.log('[G2] 结果已保存', output);
  } catch (err) {
    console.error('[G2] 保存失败:', err);
  }

  // Phase 5: 完成页
  await DiscardStrategy.renderCompletion(root, output, GAME_CONFIG);
}

// 启动
run().catch(err => {
  console.error('[G2] 运行时错误:', err);
  document.getElementById('js-game-root').innerHTML =
    `<p style="color:var(--color-error);text-align:center;padding:var(--space-12);">出错了：${err.message}</p>`;
});
</script>

</body>
</html>
