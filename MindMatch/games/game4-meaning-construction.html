<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>六帧手记 — MindMatch</title>

<link rel="stylesheet" href="../css/base.css?v=20260603e">

<style>
/* ================================================================
   G4 暗房洗印 — 深红 safelight · 显影盘 · 底片浮现
   ================================================================ */

/* === 色板 === */
:root {
  --dr-bg:          hsl(0, 12%, 2.5%);
  --dr-text:        hsl(15, 20%, 78%);
  --dr-text-muted:  hsl(0, 8%, 48%);
  --dr-border:      hsl(0, 18%, 16%);
  --dr-surface:     hsl(0, 12%, 6%);
  --dr-surface-hover: hsl(0, 14%, 9%);
}

/* -- 全局背景：极暗棕黑 + 暗房 safelight 红光 -- */
body { background: var(--dr-bg); }

.game-container {
  position:relative; min-height:100vh; overflow:hidden;
}

/* Safelight 环境光 — 从上方偏左洒下的暗房红灯 */
.game-container::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 75% 50% at 35% 10%, hsla(0,72%,18%,0.28), transparent 70%),
    radial-gradient(ellipse 50% 35% at 55% 35%, hsla(0,55%,12%,0.18), transparent 60%),
    radial-gradient(ellipse 60% 20% at 50% 95%, hsla(0,40%,8%,0.1), transparent 60%);
  animation: dr-safelight-breathe 8s ease-in-out infinite alternate;
}
@keyframes dr-safelight-breathe {
  0%   { opacity: 0.85; }
  100% { opacity: 1; }
}

/* 胶片颗粒覆盖层 */
.game-container::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat:repeat; background-size:256px 256px;
}

/* ========== 引导页 —「暗房门缝」========== */
.g4-intro {
  position:relative; z-index:1; text-align:center;
  padding:var(--space-16) var(--space-4); overflow:hidden;
}
.g4-intro__ambient {
  position:absolute; inset:0; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse at 50% 35%, hsla(0,65%,18%,0.22), transparent 65%);
}
.g4-intro > * { position:relative; z-index:1; }
.g4-intro__subtitle {
  color:hsla(0,30%,42%,0.7); font-size:var(--text-xs);
  letter-spacing:0.28em; text-transform:uppercase;
  font-family:Georgia,serif;
}
.g4-intro__title {
  font-size:var(--text-4xl); font-weight:400;
  font-family:Georgia,'Noto Serif SC',serif;
  margin:var(--space-3) 0 var(--space-4);
  color:hsla(0,50%,72%,0.92);
  text-shadow: 0 0 40px hsla(0,60%,30%,0.3);
}
.g4-intro__desc {
  color:hsla(0,10%,52%,0.65); max-width:480px;
  margin:0 auto var(--space-6); line-height:1.8;
  font-size:var(--text-sm);
}
.g4-intro__time {
  color:hsla(0,8%,38%,0.45); font-size:var(--text-xs);
  margin-bottom:var(--space-8);
}

/* 引导页 CTA — 暗房开关按钮 */
.g4-intro__cta {
  display:inline-flex; align-items:center; gap:10px;
  padding:14px 40px;
  background:hsla(0,30%,5%,0.85);
  border:1px solid hsla(0,45%,28%,0.5);
  color:hsla(0,60%,68%,0.88);
  font-size:var(--text-base);
  font-family:Georgia,'Noto Serif SC',serif;
  font-weight:400; letter-spacing:0.1em;
  cursor:pointer; position:relative;
  transition:all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 0 hsla(0,65%,35%,0);
}
/* 暗房指示灯 — 顶部小红点 */
.g4-intro__cta::before {
  content:''; position:absolute; top:-5px; left:50%; transform:translateX(-50%);
  width:6px; height:6px;
  background:hsl(0,70%,45%);
  border-radius:50%;
  box-shadow:0 0 8px hsla(0,80%,50%,0.6), 0 0 16px hsla(0,70%,40%,0.3);
}
.g4-intro__cta:hover {
  border-color:hsla(0,65%,45%,0.7);
  background:hsla(0,35%,8%,0.85);
  color:hsla(0,70%,78%,0.95);
  box-shadow:0 0 36px hsla(0,60%,30%,0.25), 0 0 64px hsla(0,55%,20%,0.12);
  transform:translateY(-2px);
}
.g4-intro__cta:hover::before {
  box-shadow:0 0 14px hsla(0,90%,55%,0.8), 0 0 24px hsla(0,80%,45%,0.4);
}
.g4-intro__cta:active {
  transform:translateY(0);
  box-shadow:0 0 18px hsla(0,50%,25%,0.15);
}

/* ========== 场景卡片 —「显影盘」========== */
.g4-scene {
  position:relative; z-index:1;
  max-width:720px; margin:0 auto;
  padding:var(--space-8) var(--space-10);
  animation:dr-develop 0.9s ease;
}
.g4-scene::before {
  content:''; position:absolute; inset:0; z-index:-1;
  border:1px solid hsla(0,25%,18%,0.5);
  border-radius:2px;
  background: linear-gradient(180deg,
    hsla(0,15%,10%,0.25) 0%,
    hsla(0,12%,6%,0.1) 40%,
    hsla(0,10%,4%,0.05) 100%);
}
/* 液面反光 */
.g4-scene::after {
  content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
  background:linear-gradient(90deg, transparent, hsla(0,30%,25%,0.3), transparent);
  opacity:0.5; pointer-events:none;
}

@keyframes dr-develop {
  from { opacity:0; filter:brightness(0.3) saturate(0.5); }
  to   { opacity:1; filter:brightness(1) saturate(1); }
}

/* 进度 — 暗房计时器指示灯 */
.g4-scene__progress {
  display:flex; align-items:center; gap:5px;
  margin-bottom:var(--space-10);
  font-family:Georgia,serif;
}
.g4-dot {
  width:5px; height:12px; border-radius:1px;
  background:hsla(0,15%,14%,0.4);
  transition:all 0.5s;
}
.g4-dot--done { background:hsla(0,30%,25%,0.5); }
.g4-dot--active {
  background:hsla(0,75%,42%,0.9);
  box-shadow:0 0 10px hsla(0,80%,45%,0.6), 0 0 20px hsla(0,70%,35%,0.25);
  animation: dr-dot-pulse 2s ease-in-out infinite;
}
@keyframes dr-dot-pulse {
  0%,100% { box-shadow:0 0 10px hsla(0,80%,45%,0.6), 0 0 20px hsla(0,70%,35%,0.25); }
  50%    { box-shadow:0 0 16px hsla(0,85%,50%,0.8), 0 0 28px hsla(0,75%,40%,0.35); }
}
.g4-scene__step {
  font-size:var(--text-xs); color:hsla(0,10%,36%,0.55);
  margin-left:auto; letter-spacing:0.12em;
}

/* 场记标签 */
.g4-scene__tag {
  display:inline-block; padding:2px 12px;
  background:hsla(0,20%,8%,0.65);
  color:hsla(0,50%,48%,0.85);
  border:1px solid hsla(0,25%,20%,0.35);
  font-size:var(--text-xs); font-weight:600;
  letter-spacing:0.1em; font-family:Georgia,serif;
  margin-bottom:var(--space-5);
}

/* 标题 — 暗红衬线 */
.g4-scene__title {
  font-size:var(--text-3xl); font-weight:400;
  font-family:Georgia,'Noto Serif SC',serif;
  color:hsla(0,40%,74%,0.88);
  margin-bottom:var(--space-5);
  letter-spacing:0.05em;
}

/* 故事正文 */
.g4-scene__story {
  color:hsla(0,8%,60%,0.7);
  font-size:var(--text-base); line-height:2;
  margin-bottom:var(--space-10);
  font-family: system-ui,-apple-system,sans-serif;
}

/* ========== 反应卡片 —「药水工序」========== */
.g4-reaction-card {
  background: hsla(0,12%,5%,0.65);
  border: 1px solid hsla(0,22%,16%,0.5);
  border-radius: 2px;
  padding: var(--space-6) var(--space-6);
  margin-bottom: var(--space-6);
  transition: opacity 0.5s ease, transform 0.5s ease;
  position:relative; overflow:hidden;
}
.g4-reaction-card::before {
  content:''; position:absolute; top:0; left:8%; right:8%; height:1px;
  background:linear-gradient(90deg, transparent, hsla(0,25%,20%,0.25), transparent);
  opacity:0.4;
}
/* 反应① 显影液 — 微红左边框 */
.g4-reaction-card:nth-of-type(1) {
  border-left: 2px solid hsla(0,35%,25%,0.4);
}
/* 反应② 定影液 — 微暗左边框 */
.g4-reaction-card:nth-of-type(2) {
  border-left: 2px solid hsla(0,18%,18%,0.4);
}

.g4-reaction-card--hidden {
  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
  max-height: 0;
  padding-top: 0; padding-bottom: 0;
  margin-bottom: 0;
  border-width: 0;
  overflow: hidden;
  transition: opacity 0.5s ease, transform 0.5s ease,
    max-height 0.4s ease, padding 0.4s ease, margin 0.4s ease,
    border-width 0.1s ease 0.3s;
}
.g4-reaction-card--hidden.g4-reaction-card--revealed,
.g4-reaction-card:not(.g4-reaction-card--hidden) {
  max-height: 500px;
}
.g4-reaction-card--revealed {
  animation: dr-bath-reveal 0.6s ease forwards;
}
@keyframes dr-bath-reveal {
  from { filter:brightness(0.5); box-shadow: 0 0 0 hsla(0,60%,30%,0); }
  to   { filter:brightness(1); box-shadow: 0 0 18px hsla(0,50%,20%,0.1); }
}

.g4-reaction-card__prompt {
  color: hsla(0,18%,40%,0.65);
  font-size: var(--text-xs);
  text-align: left; margin-bottom: var(--space-4);
  letter-spacing: 0.08em;
  font-family: Georgia, serif;
}

/* 选项按钮 */
.g4-reaction-card__options { display:flex; flex-direction:column; gap:var(--space-3); }
.g4-option {
  padding:var(--space-5) var(--space-6);
  background:hsla(0,15%,6%,0.55);
  border:1px solid hsla(0,18%,18%,0.5);
  border-radius:2px;
  color:hsla(0,10%,68%,0.75);
  font-size:var(--text-sm); line-height:1.6;
  cursor:pointer; text-align:left;
  transition:border-color 0.35s, background 0.35s, transform 0.2s, box-shadow 0.35s;
}
.g4-option:hover {
  border-color:hsla(0,50%,38%,0.65);
  background:hsla(0,25%,9%,0.6);
  box-shadow:0 0 22px hsla(0,55%,30%,0.1);
  transform:translateY(-1px);
  color:hsla(0,20%,78%,0.85);
}
.g4-option--chosen {
  border-color:hsla(0,65%,48%,0.8);
  background:hsla(0,35%,14%,0.7);
  box-shadow:0 0 28px hsla(0,60%,38%,0.2), 0 0 48px hsla(0,50%,28%,0.08);
  transform:translateY(-1px);
  color:hsla(0,30%,82%,0.9);
  animation: dr-option-select 0.4s ease;
}
@keyframes dr-option-select {
  0%   { box-shadow:0 0 0 hsla(0,70%,45%,0); border-color:hsla(0,20%,22%,0.5); }
  50%  { box-shadow:0 0 40px hsla(0,65%,42%,0.35); border-color:hsla(0,75%,52%,0.9); }
  100% { box-shadow:0 0 28px hsla(0,60%,38%,0.2); border-color:hsla(0,65%,48%,0.8); }
}

/* ========== 完成页 —「晾干挂线」========== */
.g4-completion {
  position:relative; z-index:1; text-align:center;
  padding:var(--space-16) var(--space-4);
  max-width:520px; margin:0 auto;
}
/* 晾干绳 */
.g4-completion::before {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:180px; height:1px;
  background:linear-gradient(90deg, transparent, hsla(0,25%,25%,0.5), transparent);
}
.g4-completion__icon { font-size:3rem; margin-bottom:var(--space-4); }
.g4-completion__title {
  font-size:var(--text-3xl); font-weight:400;
  font-family:Georgia,'Noto Serif SC',serif;
  color:hsla(0,40%,74%,0.88);
  margin-bottom:var(--space-4);
}
.g4-completion__subtitle {
  color:hsla(0,8%,48%,0.55);
  font-size:var(--text-sm); margin-bottom:var(--space-8);
}
.g4-completion__type {
  background:hsla(0,12%,5%,0.55);
  border:1px solid hsla(0,20%,18%,0.4);
  border-radius:2px; padding:var(--space-6);
  margin-bottom:var(--space-8);
  box-shadow: 0 4px 18px hsla(0,15%,3%,0.4);
}
.g4-type__emoji { font-size:2.5rem; display:block; margin-bottom:var(--space-3); }
.g4-type__label {
  display:inline-block; padding:var(--space-1) var(--space-4);
  background:hsla(0,35%,14%,0.5);
  color:hsla(0,50%,55%,0.85);
  border:1px solid hsla(0,30%,22%,0.35);
  font-weight:600; font-size:var(--text-lg);
  font-family:Georgia,serif; letter-spacing:0.08em;
  margin-bottom:var(--space-3);
}
.g4-type__title {
  color:hsla(0,25%,72%,0.78);
  font-size:var(--text-lg); font-weight:600;
  display:block; margin-bottom:var(--space-3);
}
.g4-type__desc {
  color:hsla(0,8%,50%,0.55);
  font-size:var(--text-sm); line-height:1.7; margin:0;
}
.g4-completion__nav {
  display:flex; gap:var(--space-4); justify-content:center; flex-wrap:wrap;
}
.g4-completion__nav .btn {
  background:hsla(0,15%,8%,0.6);
  border:1px solid hsla(0,20%,20%,0.5);
  color:hsla(0,25%,66%,0.78);
}
.g4-completion__nav .btn:hover {
  border-color:hsla(0,45%,38%,0.6);
  background:hsla(0,25%,12%,0.6);
  color:hsla(0,35%,78%,0.88);
}

/* ========== 响应式 ========== */
@media (max-width: 768px) {
  .g4-scene { padding: var(--space-7) var(--space-6); }
  .g4-scene__title { font-size: var(--text-2xl); }
}

@media (max-width: 640px) {
  .g4-scene { padding: var(--space-6) var(--space-5); }
  .g4-scene__title { font-size: var(--text-2xl); }
  .g4-option { padding: var(--space-4) var(--space-5); }
}

@media (max-width: 480px) {
  .g4-intro { padding: var(--space-10) var(--space-3); }
  .g4-intro__title { font-size: var(--text-2xl); }
  .g4-scene { padding: var(--space-4) var(--space-3); }
  .g4-scene__title { font-size: var(--text-lg); }
  .g4-scene__story { font-size: var(--text-sm); line-height: 1.7; }
  .g4-scene__tag { font-size: 10px; padding: 2px 8px; }
  .g4-option { padding: var(--space-3) var(--space-4); font-size: var(--text-xs); }
  .g4-reaction-card__prompt { font-size: 10px; }
  .g4-reaction-card { padding: var(--space-4); }
  .g4-completion { padding: var(--space-10) var(--space-3); }
  .g4-completion__title { font-size: var(--text-2xl); }
  .g4-completion__type { padding: var(--space-4); }
  .g4-type__emoji { font-size: 2rem; }
  .g4-type__label { font-size: var(--text-base); }
  .g4-type__title { font-size: var(--text-base); }
  .g4-type__desc { font-size: var(--text-xs); }
}
</style>
</head>
<body>

<div class="game-container" id="js-game-root">
  <p style="text-align:center;color:var(--color-text-muted);padding:var(--space-12);">加载中...</p>
</div>

<script type="module">
// ============================================================
// G4 游戏页面（线性循环: 6场景 × 双重反应）
// ============================================================

import { SCENARIOS, GAME_CONFIG } from '../js/games/game4-data.js?v=20260603e';
import { DualReactionStrategy } from '../js/games/strategies/dual-reaction.js?v=20260603e';
import { save } from '../js/core/store.js?v=20260603e';
import { clamp } from '../js/core/utils.js?v=20260603e';

async function run() {
  const root = document.getElementById('js-game-root');
  const gameStart = performance.now();

  // Phase 0: 引导页
  await DualReactionStrategy.renderIntro(root, GAME_CONFIG);

  // Phase 1: 6 个场景线性循环
  const decisions = [];
  let presenceRaw = 0;
  let searchRaw = 0;

  for (let i = 0; i < SCENARIOS.length; i++) {
    const scenario = SCENARIOS[i];
    const result = await DualReactionStrategy.renderScenario(root, scenario, i, SCENARIOS.length);

    // 从选项 ID 反查 score
    const pOpt = scenario.reactions.presence.options.find(o => o.id === result.presenceChoice);
    const sOpt = scenario.reactions.search.options.find(o => o.id === result.searchChoice);
    const pScore = pOpt ? pOpt.score : 0;
    const sScore = sOpt ? sOpt.score : 0;
    presenceRaw += pScore;
    searchRaw += sScore;

    decisions.push({
      scenarioId: scenario.id,
      reactionPresence: result.presenceChoice,
      reactionSearch: result.searchChoice,
      reactionTimeMs: result.reactionTime,
      reactionOneMs: result.reactionOneMs,
      reactionTwoMs: result.reactionTwoMs,
    });
  }

  // Phase 2: 计分
  // normalize: [-6,+6] → [0,10]
  const presence = clamp(Math.round(((presenceRaw + 6) / 12) * 10), 0, 10);
  const search = clamp(Math.round(((searchRaw + 6) / 12) * 10), 0, 10);

  // profileType: Presence × Search 交叉
  let profileType;
  if (presence >= 5 && search >= 5) profileType = '成长型';
  else if (presence >= 5 && search < 5) profileType = '安定型';
  else if (presence < 5 && search >= 5) profileType = '探索型';
  else profileType = '游离型';

  const totalTime = Math.round(performance.now() - gameStart);

  const output = {
    gameId: 'game4',
    version: '1.0.0',
    dimensions: { presence, search },
    behaviorSummary: { profileType },
    decisions,
    meta: {
      totalTime,
      elapsedMs: totalTime,
      reactionCount: decisions.length,
      avgReactionTimeMs: Math.round(decisions.reduce((s, d) => s + d.reactionTimeMs, 0) / decisions.length),
      completedAt: Date.now(),
    },
  };

  // 保存
  try {
    save('game4', output);
    console.log('[G4] 结果已保存', output);
  } catch (err) {
    console.error('[G4] 保存失败:', err);
  }

  // Phase 3: 完成页
  await DualReactionStrategy.renderCompletion(root, output, GAME_CONFIG);
}

run().catch(err => {
  console.error('[G4] 运行时错误:', err);
  document.getElementById('js-game-root').innerHTML =
    `<p style="color:var(--color-error);text-align:center;padding:var(--space-12);">出错了：${err.message}</p>`;
});
</script>
