<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>测试跳转</title></head>
<body>
<script>
const now = Date.now();
const makeMeta = (ms) => ({ totalTime: ms, completedAt: now - ms });

// G1 核心驱动力: nAch/nPow/nAff [0,10]
localStorage.setItem("mindmatch_game1", JSON.stringify({
  gameId: "game1", version: "1.0",
  dimensions: { nAch: 7, nPow: 3, nAff: 8 },
  meta: makeMeta(90000)
}));

// G2 职业锚: TF/GM/AU/SE/EC/SV/CH/LS [0,10]
localStorage.setItem("mindmatch_game2", JSON.stringify({
  gameId: "game2", version: "1.0",
  dimensions: { TF: 5, GM: 6, AU: 4, SE: 7, EC: 3, SV: 9, CH: 2, LS: 8 },
  meta: makeMeta(120000)
}));

// G3 认知风格: wholistAnalytic [-1, +1]
localStorage.setItem("mindmatch_game3", JSON.stringify({
  gameId: "game3", version: "1.0",
  dimensions: { wholistAnalytic: 0.3 },
  meta: makeMeta(60000)
}));

// G4 意义建构: presence/search [0,10]
localStorage.setItem("mindmatch_game4", JSON.stringify({
  gameId: "game4", version: "1.0",
  dimensions: { presence: 6, search: 5 },
  meta: makeMeta(75000)
}));

// 元数据
localStorage.setItem("mindmatch_meta", JSON.stringify({
  userId: "test-user-day11",
  completedGames: ["game1", "game2", "game3", "game4"]
}));

window.location.href = "results.html";
</script>
</body>
</html>
