<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindMatch — 核心驱动力</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/games.css">
</head>
<body>
  <main class="game-container" id="js-game-root"></main>

  <script type="module">
    import { GameEngine } from '../js/games/engine.js';
    import { CardClickStrategy } from '../js/games/strategies/card-click.js';
    import { GAME1_CONFIG } from '../js/games/game1-data.js';

    const root = document.getElementById('js-game-root');

    try {
      const engine = new GameEngine(GAME1_CONFIG, CardClickStrategy, root, {
        onProgress(current, total) {
          console.log(`[G1] 进度: ${current}/${total}`);
        },
        onDecision(record) {
          console.log(`[G1] 决策: ${record.chosenOptionId}, 耗时 ${record.decisionTime}ms`);
        },
        onPhaseChange({ from, to }) {
          console.log(`[G1] 状态: ${from} → ${to}`);
        },
        onComplete(result) {
          console.log('[G1] 完成', result);
        },
      });

      await engine.run();
    } catch (err) {
      root.innerHTML = `
        <div class="game-complete">
          <h2>出错啦</h2>
          <p>${err.message}</p>
          <button class="btn btn-secondary" onclick="location.reload()">重试</button>
        </div>
      `;
      console.error('[G1] 引擎错误:', err);
    }
  </script>
</body>
</html>
