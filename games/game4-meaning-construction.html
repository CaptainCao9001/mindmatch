<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
/* ================================================================
   G4 胶片放映机 — 暗色底 · 电影感 · 琥珀暖光
   ================================================================ */

/* -- 全局背景：深黑 + 放映机光晕 -- */
body { background:#080808; }

.game-container {
  position:relative; min-height:100vh; overflow:hidden;
}

/* 环境光层：琥珀色放映机光从上方洒下 */
.game-container::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 30%, rgba(210,140,40,0.10), transparent),
    radial-gradient(ellipse 60% 40% at 30% 80%, rgba(180,110,30,0.05), transparent),
    radial-gradient(ellipse 50% 30% at 70% 70%, rgba(200,150,50,0.04), transparent);
}

/* 胶片颗粒覆盖层 */
.game-container::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat:repeat; background-size:256px 256px;
}

/* ========== 引导页 ========== */
.g4-intro {
  position:relative; z-index:1; text-align:center;
  padding:var(--space-16) var(--space-4); overflow:hidden;
}
.g4-intro__ambient {
  position:absolute; inset:0; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse at 50% 40%, rgba(210,140,40,0.15), transparent 60%);
}
.g4-intro > * { position:relative; z-index:1; }
.g4-intro__subtitle {
  color:hsla(38,40%,55%,0.8); font-size:var(--text-xs);
  letter-spacing:0.25em; text-transform:uppercase;
  font-family:Georgia,serif;
}
.g4-intro__title {
  font-size:var(--text-4xl); font-weight:400;
  font-family:Georgia,'Noto Serif SC',serif;
  margin:var(--space-3) 0 var(--space-4);
  color:hsla(38,60%,80%,0.95);
}
.g4-intro__desc {
  color:hsla(38,20%,60%,0.7); max-width:480px;
  margin:0 auto var(--space-6); line-height:1.8;
  font-size:var(--text-sm);
}
.g4-intro__time {
  color:hsla(38,20%,50%,0.5); font-size:var(--text-xs);
  margin-bottom:var(--space-8);
}

/* 引导页 CTA — 胶片质感按钮 */
.g4-intro__cta {
  display:inline-flex; align-items:center; gap:10px;
  padding:14px 40px;
  background:hsla(38,30%,8%,0.8);
  border:1px solid hsla(38,50%,40%,0.4);
  color:hsla(38,70%,70%,0.9);
  font-size:var(--text-base);
  font-family:Georgia,'Noto Serif SC',serif;
  font-weight:400; letter-spacing:0.08em;
  cursor:pointer;
  position:relative;
  transition:all 0.35s;
}
/* 齿孔装饰线 */
.g4-intro__cta::before {
  content:''; position:absolute; left:-1px; top:4px; bottom:4px; width:2px;
  background: repeating-linear-gradient(
    to bottom,
    transparent, transparent 3px,
    hsla(38,50%,45%,0.5) 3px, hsla(38,50%,45%,0.5) 5px,
    transparent 5px, transparent 8px
  );
}
.g4-intro__cta::after {
  content:''; position:absolute; right:-1px; top:4px; bottom:4px; width:2px;
  background: repeating-linear-gradient(
    to bottom,
    transparent, transparent 3px,
    hsla(38,50%,45%,0.5) 3px, hsla(38,50%,45%,0.5) 5px,
    transparent 5px, transparent 8px
  );
}
.g4-intro__cta:hover {
  border-color:hsla(38,70%,55%,0.7);
  background:hsla(38,40%,12%,0.8);
  color:hsla(38,80%,80%,0.95);
  box-shadow:0 0 30px hsla(38,60%,40%,0.15);
  transform:translateY(-1px);
}
.g4-intro__cta:active {
  transform:translateY(0);
  box-shadow:0 0 12px hsla(38,60%,35%,0.1);
}

/* ========== 场景卡片 — 胶片画框 ========== */
.g4-scene {
  position:relative; z-index:1;
  max-width:720px; margin:0 auto;
  padding:var(--space-8) var(--space-10);
  /* 胶片齿孔：左右两侧重复圆点 */
  border-left: 3px solid hsla(38,30%,30%,0.4);
  border-right: 3px solid hsla(38,30%,30%,0.4);
  border-image: none;
  animation:filmAdvance 0.7s ease;
}

/* 齿孔装饰 */
.g4-scene::before,
.g4-scene::after {
  content:''; position:absolute; top:0; bottom:0; width:3px;
  background: repeating-linear-gradient(
    to bottom,
    transparent, transparent 8px,
    hsla(38,30%,25%,0.5) 8px, hsla(38,30%,25%,0.5) 13px,
    transparent 13px, transparent 21px
  );
}
.g4-scene::before { left:-3px; }
.g4-scene::after  { right:-3px; }

@keyframes filmAdvance {
  from { opacity:0; filter:brightness(1.5); }
  to   { opacity:1; filter:brightness(1); }
}

/* 进度 — 改为帧计数 */
.g4-scene__progress {
  display:flex; align-items:center; gap:6px;
  margin-bottom:var(--space-10);
  font-family:Georgia,serif;
}
.g4-dot {
  width:6px; height:14px; border-radius:2px;
  background:hsla(38,20%,30%,0.3);
  transition:all 0.4s;
}
.g4-dot--done { background:hsla(38,50%,45%,0.6); }
.g4-dot--active {
  background:hsla(38,80%,55%,0.9);
  box-shadow:0 0 10px hsla(38,80%,50%,0.5);
}
.g4-scene__step {
  font-size:var(--text-xs);
  color:hsla(38,20%,45%,0.6);
  margin-left:auto; letter-spacing:0.1em;
}

/* tag — 场记板标签 */
.g4-scene__tag {
  display:inline-block;
  padding:2px 12px;
  background:hsla(38,30%,12%,0.6);
  color:hsla(38,60%,55%,0.9);
  border:1px solid hsla(38,40%,30%,0.3);
  font-size:var(--text-xs); font-weight:600;
  letter-spacing:0.08em; font-family:Georgia,serif;
  margin-bottom:var(--space-5);
}

/* 标题 — 衬线体，字幕卡质感 */
.g4-scene__title {
  font-size:var(--text-3xl); font-weight:400;
  font-family:Georgia,'Noto Serif SC',serif;
  color:hsla(38,60%,85%,0.9);
  margin-bottom:var(--space-5);
  letter-spacing:0.04em;
}

/* 故事正文 */
.g4-scene__story {
  color:hsla(38,15%,65%,0.75);
  font-size:var(--text-base); line-height:2;
  margin-bottom:var(--space-10);
  font-family: system-ui,-apple-system,sans-serif;
}

/* ========== 场景插图 ========== */
.g4-scene__illustration {
  margin-bottom: var(--space-8);
  text-align: center;
}
.g4-scene__illustration img {
  max-width: 320px;
  width: 100%;
  height: auto;
  border-radius: 4px;
  border: 1px solid hsla(38,20%,25%,0.3);
  filter: grayscale(100%);
  opacity: 0.85;
}

/* ========== 反应卡片 — 各自独立框 ========== */
.g4-reaction-card {
  background: hsla(38,15%,8%,0.6);
  border: 1px solid hsla(38,25%,22%,0.5);
  border-radius: 4px;
  padding: var(--space-6) var(--space-6);
  margin-bottom: var(--space-6);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.g4-reaction-card--hidden {
  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
  max-height: 0;
  padding-top: 0;
  padding-bottom: 0;
  margin-bottom: 0;
  border-width: 0;
  overflow: hidden;
  transition: opacity 0.5s ease, transform 0.5s ease, max-height 0.4s ease, padding 0.4s ease, margin 0.4s ease, border-width 0.1s ease 0.3s;
}
.g4-reaction-card--hidden.g4-reaction-card--revealed,
.g4-reaction-card:not(.g4-reaction-card--hidden) {
  max-height: 500px;
}
.g4-reaction-card__prompt {
  color: hsla(38,30%,50%,0.7);
  font-size: var(--text-xs);
  text-align: left;
  margin-bottom: var(--space-4);
  letter-spacing: 0.06em;
  font-family: Georgia, serif;
}

/* 选项卡片 */
.g4-reaction-card__options { display:flex; flex-direction:column; gap:var(--space-3); }
.g4-option {
  padding:var(--space-5) var(--space-6);
  background:hsla(38,20%,10%,0.5);
  border:1px solid hsla(38,20%,25%,0.5);
  border-radius:2px;
  color:hsla(38,15%,70%,0.8);
  font-size:var(--text-sm); line-height:1.6;
  cursor:pointer; text-align:left;
  transition:border-color 0.3s, background 0.3s, transform 0.2s, box-shadow 0.3s;
}
.g4-option:hover {
  border-color:hsla(38,60%,50%,0.6);
  background:hsla(38,40%,12%,0.6);
  box-shadow:0 0 20px hsla(38,60%,40%,0.08);
  transform:translateY(-1px);
}
.g4-option--chosen {
  border-color:hsla(38,70%,55%,0.8);
  background:hsla(38,50%,15%,0.7);
  box-shadow:0 0 24px hsla(38,60%,45%,0.15);
  transform:translateY(-1px);
}

/* ========== 完成页 ========== */
.g4-completion {
  position:relative; z-index:1; text-align:center;
  padding:var(--space-16) var(--space-4);
  max-width:520px; margin:0 auto;
}
.g4-completion__icon { font-size:3rem; margin-bottom:var(--space-4); }
.g4-completion__title {
  font-size:var(--text-3xl); font-weight:400;
  font-family:Georgia,'Noto Serif SC',serif;
  color:hsla(38,60%,80%,0.9);
  margin-bottom:var(--space-4);
}
.g4-completion__subtitle {
  color:hsla(38,15%,55%,0.6);
  font-size:var(--text-sm); margin-bottom:var(--space-8);
}
.g4-completion__type {
  background:hsla(38,20%,10%,0.5);
  border:1px solid hsla(38,25%,25%,0.4);
  border-radius:2px; padding:var(--space-6);
  margin-bottom:var(--space-8);
}
.g4-type__emoji { font-size:2.5rem; display:block; margin-bottom:var(--space-3); }
.g4-type__label {
  display:inline-block; padding:var(--space-1) var(--space-4);
  background:hsla(38,50%,25%,0.4);
  color:hsla(38,70%,60%,0.9);
  border:1px solid hsla(38,50%,35%,0.3);
  font-weight:600; font-size:var(--text-lg);
  font-family:Georgia,serif; letter-spacing:0.06em;
  margin-bottom:var(--space-3);
}
.g4-type__title {
  color:hsla(38,40%,75%,0.8);
  font-size:var(--text-lg); font-weight:600;
  display:block; margin-bottom:var(--space-3);
}
.g4-type__desc {
  color:hsla(38,15%,55%,0.6);
  font-size:var(--text-sm); line-height:1.7; margin:0;
}
.g4-completion__nav {
  display:flex; gap:var(--space-4); justify-content:center; flex-wrap:wrap;
}
.g4-completion__nav .btn {
  background:hsla(38,20%,12%,0.6);
  border:1px solid hsla(38,25%,25%,0.5);
  color:hsla(38,40%,70%,0.8);
}
.g4-completion__nav .btn:hover {
  border-color:hsla(38,50%,50%,0.6);
  background:hsla(38,40%,15%,0.6);
}

/* ========== 响应式 ========== */
@media (max-width:640px) {
  .g4-scene { padding:var(--space-6) var(--space-5); }
  .g4-scene__title { font-size:var(--text-2xl); }
  .g4-option { padding:var(--space-4) var(--space-5); }
}
</style>
</head>
<body>

<div class="game-container" id="js-game-root">
  <p style="text-align:center;color:var(--color-text-muted);padding:var(--space-12);">加载中...</p>
</div>

<script type="module">
// ============================================================
// G4 游戏页面（线性循环: 6场景 × 双重反应）
// ============================================================

import { SCENARIOS, GAME_CONFIG } from '../js/games/game4-data.js?v=20260602e';
import { DualReactionStrategy } from '../js/games/strategies/dual-reaction.js?v=20260602e';
import { save } from '../js/core/store.js?v=20260602e';
import { clamp } from '../js/core/utils.js?v=20260602e';

async function run() {
  const root = document.getElementById('js-game-root');
  const gameStart = performance.now();

  // Phase 0: 引导页
  await DualReactionStrategy.renderIntro(root, GAME_CONFIG);

  // Phase 1: 6 个场景线性循环
  const decisions = [];
  let presenceRaw = 0;
  let searchRaw = 0;

  for (let i = 0; i < SCENARIOS.length; i++) {
    const scenario = SCENARIOS[i];
    const result = await DualReactionStrategy.renderScenario(root, scenario, i, SCENARIOS.length);

    // 从选项 ID 反查 score
    const pOpt = scenario.reactions.presence.options.find(o => o.id === result.presenceChoice);
    const sOpt = scenario.reactions.search.options.find(o => o.id === result.searchChoice);
    const pScore = pOpt ? pOpt.score : 0;
    const sScore = sOpt ? sOpt.score : 0;
    presenceRaw += pScore;
    searchRaw += sScore;

    decisions.push({
      scenarioId: scenario.id,
      reactionPresence: result.presenceChoice,
      reactionSearch: result.searchChoice,
      reactionTimeMs: result.reactionTime,
    });
  }

  // Phase 2: 计分
  // normalize: [-6,+6] → [0,10]
  const presence = clamp(Math.round(((presenceRaw + 6) / 12) * 10), 0, 10);
  const search = clamp(Math.round(((searchRaw + 6) / 12) * 10), 0, 10);

  // profileType: Presence × Search 交叉
  let profileType;
  if (presence >= 5 && search >= 5) profileType = '成长型';
  else if (presence >= 5 && search < 5) profileType = '安定型';
  else if (presence < 5 && search >= 5) profileType = '探索型';
  else profileType = '游离型';

  const totalTime = Math.round(performance.now() - gameStart);

  const output = {
    gameId: 'game4',
    version: '1.0.0',
    dimensions: { presence, search },
    behaviorSummary: { profileType },
    decisions,
    meta: {
      totalTime,
      elapsedMs: totalTime,
      reactionCount: decisions.length,
      avgReactionTimeMs: Math.round(decisions.reduce((s, d) => s + d.reactionTimeMs, 0) / decisions.length),
      completedAt: Date.now(),
    },
  };

  // 保存
  try {
    save('game4', output);
    console.log('[G4] 结果已保存', output);
  } catch (err) {
    console.error('[G4] 保存失败:', err);
  }

  // Phase 3: 完成页
  await DualReactionStrategy.renderCompletion(root, output, GAME_CONFIG);
}

run().catch(err => {
  console.error('[G4] 运行时错误:', err);
  document.getElementById('js-game-root').innerHTML =
    `<p style="color:var(--color-error);text-align:center;padding:var(--space-12);">出错了：${err.message}</p>`;
});
</script>

</body>
