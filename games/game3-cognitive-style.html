<link rel="stylesheet" href="../css/base.css?v=20260603a">

<style>
/* ========== G3 专属样式 ========== */

/* ============================================================
 * 深度星空主题
 *   body → 漆黑底 + 三片星云光晕
 *   body::before → 三层定点星场（共 ~45 颗）
 *   .g3-stars → intro 加强层（流星 + 更多近星）
 * ============================================================ */

body {
  background: hsl(245,50%,2.5%);
  background-image:
    radial-gradient(ellipse 50vw 35vh at 20% 15%, hsla(270,55%,18%,0.45) 0%, transparent 70%),
    radial-gradient(ellipse 40vw 30vh at 72% 55%, hsla(215,45%,14%,0.35) 0%, transparent 65%),
    radial-gradient(ellipse 35vw 28vh at 50% 82%, hsla(250,40%,12%,0.25) 0%, transparent 60%);
}

body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    /* ▸ Layer 3 — 近星（大 / 亮 / 微蓝白） */
    radial-gradient(2px 2px at 12% 6%,   rgba(210,230,255,0.92), transparent),
    radial-gradient(2.2px 2.2px at 78% 16%, rgba(225,245,255,0.88), transparent),
    radial-gradient(1.6px 1.6px at 44% 28%, rgba(200,225,255,0.82), transparent),
    radial-gradient(2.4px 2.4px at 88% 60%, rgba(235,250,255,0.9), transparent),
    radial-gradient(1.8px 1.8px at 22% 68%, rgba(205,220,255,0.78), transparent),
    radial-gradient(2px 2px at 60% 8%,   rgba(215,235,255,0.85), transparent),

    /* ▸ Layer 2 — 中距（1px / 微亮 / 均匀散布） */
    radial-gradient(1px 1px at 4% 20%,   rgba(175,210,240,0.62), transparent),
    radial-gradient(1px 1px at 16% 36%,  rgba(165,195,235,0.54), transparent),
    radial-gradient(1px 1px at 25% 10%,  rgba(180,215,245,0.58), transparent),
    radial-gradient(1px 1px at 32% 45%,  rgba(170,200,240,0.5), transparent),
    radial-gradient(1px 1px at 50% 6%,   rgba(185,220,250,0.6), transparent),
    radial-gradient(1px 1px at 58% 25%,  rgba(175,210,245,0.54), transparent),
    radial-gradient(1px 1px at 66% 38%,  rgba(165,200,235,0.5), transparent),
    radial-gradient(1px 1px at 76% 32%,  rgba(180,215,245,0.58), transparent),
    radial-gradient(1px 1px at 90% 12%,  rgba(170,205,240,0.52), transparent),
    radial-gradient(1px 1px at 7% 54%,   rgba(175,210,245,0.5), transparent),
    radial-gradient(1px 1px at 14% 78%,  rgba(165,195,235,0.52), transparent),
    radial-gradient(1px 1px at 35% 58%,  rgba(180,215,250,0.5), transparent),
    radial-gradient(1px 1px at 46% 74%,  rgba(170,205,240,0.54), transparent),
    radial-gradient(1px 1px at 55% 52%,  rgba(185,220,250,0.58), transparent),
    radial-gradient(1px 1px at 63% 80%,  rgba(175,210,245,0.48), transparent),
    radial-gradient(1px 1px at 72% 68%,  rgba(165,200,235,0.52), transparent),
    radial-gradient(1px 1px at 82% 45%,  rgba(180,215,250,0.5), transparent),
    radial-gradient(1px 1px at 40% 20%,  rgba(170,205,240,0.56), transparent),
    radial-gradient(1px 1px at 94% 74%,  rgba(175,210,245,0.44), transparent),
    radial-gradient(1px 1px at 52% 35%,  rgba(185,220,255,0.5), transparent),

    /* ▸ Layer 1 — 远星（0.5px / 微暗 / 密集） */
    radial-gradient(.5px .5px at 2% 4%,   rgba(140,175,215,0.48), transparent),
    radial-gradient(.5px .5px at 10% 28%, rgba(150,185,220,0.42), transparent),
    radial-gradient(.6px .6px at 18% 15%, rgba(145,180,215,0.38), transparent),
    radial-gradient(.4px .4px at 27% 40%, rgba(155,190,225,0.4), transparent),
    radial-gradient(.5px .5px at 35% 5%,  rgba(140,175,210,0.44), transparent),
    radial-gradient(.6px .6px at 43% 55%, rgba(150,185,220,0.38), transparent),
    radial-gradient(.4px .4px at 50% 26%, rgba(160,195,230,0.42), transparent),
    radial-gradient(.5px .5px at 60% 15%, rgba(145,180,215,0.36), transparent),
    radial-gradient(.5px .5px at 68% 50%, rgba(155,190,225,0.4), transparent),
    radial-gradient(.4px .4px at 75% 8%,  rgba(140,175,210,0.42), transparent),
    radial-gradient(.6px .6px at 84% 55%, rgba(150,185,220,0.38), transparent),
    radial-gradient(.5px .5px at 92% 30%, rgba(160,195,230,0.44), transparent),
    radial-gradient(.4px .4px at 5% 72%,  rgba(145,180,215,0.38), transparent),
    radial-gradient(.5px .5px at 22% 85%, rgba(155,190,225,0.36), transparent),
    radial-gradient(.6px .6px at 32% 15%, rgba(140,175,210,0.4), transparent),
    radial-gradient(.4px .4px at 48% 65%, rgba(150,185,220,0.38), transparent),
    radial-gradient(.5px .5px at 65% 90%, rgba(145,180,215,0.35), transparent),
    radial-gradient(.5px .5px at 80% 78%, rgba(155,190,225,0.4), transparent),
    radial-gradient(.6px .6px at 38% 88%, rgba(140,175,210,0.36), transparent),
    radial-gradient(.4px .4px at 95% 42%, rgba(150,185,220,0.38), transparent),
    radial-gradient(.5px .5px at 28% 62%, rgba(160,195,230,0.34), transparent);
  animation:g3-stars-sway 40s linear infinite;
}
@keyframes g3-stars-sway { 0%{opacity:1} 50%{opacity:0.7} 100%{opacity:1} }

/* --- 容器置顶 --- */
.game-container { position:relative; z-index:1; }

/* ========== 引导页 — 星空叙事 ========== */
.g3-intro {
  position:relative; text-align:center;
  padding:var(--space-16) var(--space-4);
  overflow:hidden;
}

/* intro 专属星星层（比全局更密 / 微移视差） */
.g3-stars {
  position:absolute; inset:-40%;
  background:
    /* 近星特大 ×3 */
    radial-gradient(2.2px 2.2px at 15% 12%, rgba(220,240,255,0.95), transparent),
    radial-gradient(2.6px 2.6px at 82% 25%, rgba(235,250,255,0.9), transparent),
    radial-gradient(2px 2px at 55% 55%,   rgba(210,230,255,0.85), transparent),
    /* 中距补星 ×15 */
    radial-gradient(1px 1px at 8% 35%,  rgba(175,210,240,0.55), transparent),
    radial-gradient(1px 1px at 22% 55%, rgba(165,195,235,0.5), transparent),
    radial-gradient(1px 1px at 38% 18%, rgba(180,215,245,0.58), transparent),
    radial-gradient(1px 1px at 48% 72%, rgba(170,200,240,0.52), transparent),
    radial-gradient(1px 1px at 62% 15%, rgba(185,220,250,0.55), transparent),
    radial-gradient(1px 1px at 72% 48%, rgba(175,210,245,0.5), transparent),
    radial-gradient(1px 1px at 85% 70%, rgba(165,200,235,0.54), transparent),
    radial-gradient(1px 1px at 12% 82%, rgba(180,215,245,0.48), transparent),
    radial-gradient(1px 1px at 30% 8%,  rgba(170,205,240,0.55), transparent),
    radial-gradient(1px 1px at 52% 40%, rgba(185,220,255,0.5), transparent),
    radial-gradient(1px 1px at 68% 78%, rgba(175,210,245,0.46), transparent),
    radial-gradient(1px 1px at 90% 35%, rgba(165,195,235,0.52), transparent),
    radial-gradient(1px 1px at 42% 82%, rgba(180,215,250,0.48), transparent),
    radial-gradient(1px 1px at 25% 30%, rgba(170,200,240,0.54), transparent),
    radial-gradient(1px 1px at 78% 8%,  rgba(185,220,255,0.5), transparent);
  animation:g3-intro-stars 6s ease-in-out infinite alternate;
  pointer-events:none; z-index:0;
}
@keyframes g3-intro-stars { from{opacity:0.55; transform:translateY(4px)} to{opacity:1; transform:translateY(-4px)} }

/* 流星 — intro 专属 */
.g3-stars::after {
  content:'';
  position:absolute;
  top:15%; left:80%;
  width:120px; height:1.5px;
  background:linear-gradient(90deg, transparent, rgba(200,230,255,0.85), rgba(255,255,255,0.95));
  border-radius:999px;
  filter:blur(0.5px);
  animation:g3-shooting 4.5s ease-in-out infinite;
  opacity:0;
}
@keyframes g3-shooting {
  0%   { opacity:0; transform:translate(0,0) rotate(-35deg); }
  15%  { opacity:0; }
  25%  { opacity:1; }
  35%  { opacity:0.8; transform:translate(-300px,160px) rotate(-35deg); }
  36%  { opacity:0; transform:translate(-300px,160px) rotate(-35deg); }
  100% { opacity:0; transform:translate(-300px,160px) rotate(-35deg); }
}

.g3-intro > * { position:relative; z-index:1; }
.g3-intro__subtitle {
  color:hsla(230,25%,55%,0.8); font-size:var(--text-sm);
  letter-spacing:0.14em; text-transform:uppercase;
  text-shadow:0 0 20px hsla(260,40%,50%,0.3);
}
.g3-intro__title {
  font-size:var(--text-4xl); font-weight:700;
  margin:var(--space-3) 0 var(--space-4);
  background:linear-gradient(135deg, hsl(260,70%,75%), hsl(200,60%,65%));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.g3-intro__desc {
  color:hsla(230,20%,72%,0.85); max-width:480px;
  margin:0 auto var(--space-6); line-height:1.7;
}
.g3-intro__time { color:hsla(230,15%,55%,0.7); font-size:var(--text-sm); margin-bottom:var(--space-8); }

/* CTA 按钮微调 */
.g3-intro__cta {
  box-shadow:0 0 30px hsla(260,50%,50%,0.25);
}

/* ========== 阶段共用 — 太空舷窗质感 ========== */
.g3-stage { animation:fadeSlideIn 0.5s ease; }
.g3-stage__header { text-align:center; margin-bottom:var(--space-6); }
.g3-stage__badge {
  display:inline-block; padding:var(--space-1) var(--space-3);
  background:hsla(260,50%,25%,0.3);
  border:1px solid hsla(260,40%,45%,0.35);
  color:hsl(260,55%,72%);
  border-radius:999px; font-size:var(--text-xs); font-weight:600;
  backdrop-filter:blur(6px);
}
.g3-stage__title {
  font-size:var(--text-3xl); font-weight:700;
  margin:var(--space-3) 0 var(--space-1);
  color:hsla(240,30%,88%,1);
}
.g3-stage__subtitle { color:hsla(230,20%,60%,0.8); font-size:var(--text-sm); }
.g3-stage__desc {
  text-align:center; color:hsla(230,18%,68%,0.8);
  max-width:480px; margin:0 auto var(--space-4); line-height:1.7;
}
.g3-stage__hint-text { color:hsla(230,15%,52%,0.7); font-size:var(--text-sm); }
.g3-stage__bar {
  display:flex; align-items:center; justify-content:space-between;
  margin-top:var(--space-8); padding:var(--space-3) var(--space-5);
  background:hsla(240,25%,8%,0.55);
  border:1px solid hsla(240,20%,28%,0.3);
  border-radius:var(--radius-lg);
  backdrop-filter:blur(10px);
}

/* ========== 阶段一：左池 + 右三区（太空玻璃） ========== */

.g3-layout { display:flex; gap:var(--space-5); align-items:flex-start; }

/* 碎片池 */
.g3-pool {
  flex:1; min-width:0;
  border-radius:var(--radius-lg);
  border:1px solid hsla(240,22%,30%,0.35);
  background:hsla(240,30%,8%,0.45);
  padding:var(--space-4);
  position:sticky; top:var(--space-4);
  backdrop-filter:blur(8px);
  box-shadow:0 0 40px hsla(240,30%,20%,0.12);
}
.g3-pool__label {
  font-size:var(--text-xs); color:hsla(230,15%,55%,0.7);
  margin-bottom:var(--space-3); letter-spacing:0.06em;
  text-align:center;
}
.g3-pool__cards { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-2); min-height:60px; }
.g3-pool--drag-over {
  border-color:hsla(260,50%,55%,0.65);
  background:hsla(260,35%,12%,0.55);
  box-shadow:0 0 32px hsla(260,50%,40%,0.2);
}

/* 三区 */
.g3-zones { flex:1; min-width:0; display:flex; flex-direction:column; gap:var(--space-3); }

.g3-zone {
  border-radius:var(--radius-md);
  border:1px solid hsla(240,20%,30%,0.35);
  background:hsla(240,30%,8%,0.4);
  padding:var(--space-3) var(--space-4);
  transition:border-color 0.3s, background 0.3s, box-shadow 0.3s;
  min-height:90px;
  backdrop-filter:blur(6px);
  box-shadow:0 0 20px hsla(240,30%,15%,0.08);
}
.g3-zone--green  { border-color:hsla(160,50%,28%,0.45); background:hsla(160,35%,8%,0.35); }
.g3-zone--yellow { border-color:hsla(42,50%,32%,0.45); background:hsla(42,30%,8%,0.35); }
.g3-zone--red    { border-color:hsla(0,35%,28%,0.45); background:hsla(0,25%,8%,0.35); }
.g3-zone--drag-over {
  border-style:solid;
  background:hsla(260,40%,15%,0.5);
  box-shadow:0 0 36px hsla(260,55%,45%,0.25);
}
.g3-zone--green.g3-zone--drag-over  { border-color:hsla(160,60%,42%,0.75); background:hsla(160,35%,14%,0.55); box-shadow:0 0 30px hsla(160,55%,38%,0.2); }
.g3-zone--yellow.g3-zone--drag-over { border-color:hsla(42,55%,44%,0.75); background:hsla(42,32%,14%,0.55); box-shadow:0 0 30px hsla(42,55%,38%,0.2); }
.g3-zone--red.g3-zone--drag-over    { border-color:hsla(0,45%,40%,0.75); background:hsla(0,28%,14%,0.55); box-shadow:0 0 30px hsla(0,45%,35%,0.2); }

.g3-zone__header {
  display:flex; align-items:center; gap:var(--space-2);
  font-size:var(--text-xs); font-weight:600;
  margin-bottom:var(--space-2);
  padding-bottom:var(--space-1);
  border-bottom:1px solid hsla(240,15%,25%,0.25);
}
.g3-zone--green  .g3-zone__header { color:hsla(155,55%,60%,0.9); border-bottom-color:hsla(155,30%,18%,0.35); }
.g3-zone--yellow .g3-zone__header { color:hsla(45,45%,55%,0.9); border-bottom-color:hsla(45,22%,18%,0.35); }
.g3-zone--red    .g3-zone__header { color:hsla(0,35%,52%,0.85); border-bottom-color:hsla(0,18%,18%,0.35); }
.g3-zone__count { font-size:var(--text-xs); opacity:0.55; margin-left:auto; }
.g3-zone__count strong { font-size:var(--text-sm); }
.g3-zone__body { display:flex; flex-direction:column; gap:var(--space-1); min-height:28px; }
.g3-zone__empty {
  color:hsla(230,15%,50%,0.5); font-size:var(--text-xs);
  text-align:center; padding:var(--space-1) 0;
  font-style:italic;
}

/* zone 内卡片压缩 */
.g3-zone .g3-card { padding:var(--space-2) var(--space-3); }
.g3-zone .g3-card__title { font-size:var(--text-xs); margin-bottom:0; }
.g3-zone .g3-card__detail { font-size:10px; line-height:1.3; }

/* 拖拽卡片 — 太空玻璃 */
.g3-card {
  padding:var(--space-3) var(--space-4);
  border-radius:var(--radius-md);
  border:1px solid hsla(240,18%,28%,0.4);
  background:hsla(240,25%,10%,0.55);
  cursor:grab; user-select:none;
  backdrop-filter:blur(4px);
  transition:opacity 0.2s, transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}
.g3-card:hover {
  transform:translateY(-1px);
  border-color:hsla(260,40%,45%,0.55);
  box-shadow:0 2px 16px hsla(260,35%,30%,0.2);
}
.g3-card--dragging { opacity:0.3; transform:scale(0.95); }
.g3-card__title { font-weight:600; font-size:var(--text-sm); display:block; margin-bottom:var(--space-1); color:hsla(240,25%,88%,0.95); }
.g3-card__detail { color:hsla(230,15%,60%,0.75); font-size:var(--text-xs); line-height:1.4; margin:0; }

/* 已归位卡片配色 */
.g3-card--green  { background:hsla(155,30%,10%,0.55); border-color:hsla(155,45%,24%,0.55); }
.g3-card--yellow { background:hsla(45,25%,10%,0.55); border-color:hsla(45,40%,24%,0.55); }
.g3-card--red    { background:hsla(0,22%,10%,0.55); border-color:hsla(0,28%,22%,0.55); }
.g3-card--pool   { background:hsla(240,25%,10%,0.55); border-color:hsla(240,18%,28%,0.4); }

/* 移动端 */
@media (max-width:700px) {
  .g3-layout { flex-direction:column; }
  .g3-pool { flex:none; position:static; }
}

/* ========== 阶段二 — 拖拽排序 ========== */
.g3-sort-list { display:flex; flex-direction:column; gap:var(--space-3); max-width:500px; margin:0 auto; }
.g3-sort-card {
  display:flex; align-items:center; gap:var(--space-4);
  padding:var(--space-4) var(--space-5);
  background:hsla(240,25%,10%,0.5);
  border:1px solid hsla(240,20%,28%,0.4);
  border-radius:var(--radius-md);
  cursor:grab; user-select:none;
  backdrop-filter:blur(6px);
  transition:opacity 0.2s, box-shadow 0.2s, border-color 0.2s;
}
.g3-sort-card:hover {
  border-color:hsla(260,40%,45%,0.5);
  box-shadow:0 0 18px hsla(260,35%,35%,0.15);
}
.g3-sort-card--dragging { opacity:0.35; }
.g3-sort-card__rank { font-size:var(--text-lg); font-weight:700; color:var(--color-primary); min-width:2rem; text-align:center; }
.g3-sort-card__content { flex:1; min-width:0; }
.g3-sort-card__title { font-weight:600; font-size:var(--text-base); display:block; margin-bottom:var(--space-1); color:hsla(240,25%,88%,0.95); }
.g3-sort-card__detail { color:hsla(230,15%,58%,0.75); font-size:var(--text-xs); line-height:1.4; display:block; }
.g3-sort-card__handle { color:hsla(230,12%,48%,0.7); font-size:1.2rem; cursor:grab; }
.g3-sort-card__controls { display:flex; flex-direction:column; gap:2px; }
.g3-sort-btn {
  width:28px; height:22px; border:none; border-radius:3px; cursor:pointer;
  background:hsla(240,15%,25%,0.35); color:hsla(230,15%,55%,0.7);
  font-size:10px; display:flex; align-items:center; justify-content:center;
  transition:background 0.2s;
}
.g3-sort-btn:hover:not(:disabled) { background:hsla(260,45%,35%,0.4); color:var(--color-primary); }
.g3-sort-btn:disabled { opacity:0.15; cursor:not-allowed; }

/* ========== 完成页 ========== */
.g3-completion { text-align:center; padding:var(--space-12) var(--space-4); }
.g3-completion__icon { font-size:3rem; margin-bottom:var(--space-4); filter:drop-shadow(0 0 12px hsla(260,40%,50%,0.3)); }
.g3-completion__title { font-size:var(--text-3xl); font-weight:700; margin-bottom:var(--space-6); color:hsla(240,30%,90%,1); }
.g3-completion__style-tag {
  display:inline-block; padding:var(--space-2) var(--space-6);
  background:hsla(260,45%,25%,0.35);
  border:1px solid hsla(260,40%,50%,0.4);
  color:hsl(260,50%,75%);
  border-radius:999px; font-weight:700; font-size:var(--text-xl);
  margin-bottom:var(--space-4);
  backdrop-filter:blur(6px);
  box-shadow:0 0 24px hsla(260,40%,45%,0.2);
}
.g3-completion__style-title { color:hsla(230,20%,68%,0.85); font-size:var(--text-lg); margin-bottom:var(--space-6); }
.g3-continuum { display:flex; align-items:center; gap:var(--space-4); max-width:500px; margin:0 auto var(--space-8); }
.g3-continuum__label { font-size:var(--text-xs); color:hsla(230,15%,55%,0.7); white-space:nowrap; }
.g3-continuum__bar {
  flex:1; height:8px;
  background:linear-gradient(to right, hsl(155,40%,40%), var(--color-primary), hsl(280,40%,40%));
  border-radius:4px; position:relative;
  box-shadow:0 0 10px hsla(260,40%,45%,0.25);
}
.g3-continuum__fill { position:absolute; left:0; top:0; height:100%; background:transparent; border-radius:4px; }
.g3-continuum__dot {
  position:absolute; top:50%; transform:translate(-50%,-50%);
  width:18px; height:18px;
  background:white;
  border:3px solid var(--color-primary);
  border-radius:50%;
  box-shadow:0 0 20px var(--color-primary-glow), 0 0 40px hsla(260,50%,50%,0.3);
  transition:left 0.6s ease;
}
.g3-completion__desc { color:hsla(230,18%,68%,0.8); max-width:480px; margin:0 auto var(--space-6); line-height:1.7; }
.g3-completion__message { color:hsla(230,18%,68%,0.8); font-size:var(--text-base); white-space:pre-line; margin-bottom:var(--space-8); }
.g3-completion__nav { display:flex; gap:var(--space-4); justify-content:center; flex-wrap:wrap; }

@media (max-width:640px) {
  .g3-fragment-grid { grid-template-columns:1fr; }
  .g3-group-counter { gap:var(--space-3); }
}

/* ============================================================
 * G3 按钮 & 边框 — 太空主题统一
 * ============================================================ */

/* --- 阶段二按钮居中 --- */
.g3-stage__bar--center { justify-content: center; }

/* --- 主按钮（CTA / 确认 / 反馈继续 / 完成页主要按钮） --- */
.g3-intro__cta,
.g3-stage__bar .btn,
.feedback-overlay .btn,
.g3-completion .btn-primary {
  background: linear-gradient(135deg, hsla(260,58%,42%,0.85), hsla(235,48%,36%,0.85));
  border: 1px solid hsla(260,45%,52%,0.5);
  color: hsla(240,25%,93%,0.95);
  border-radius: var(--radius-md);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 22px hsla(260,48%,48%,0.28), 0 0 40px hsla(260,40%,32%,0.12);
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  font-weight: 600;
}
.g3-intro__cta:hover:not(:disabled),
.g3-stage__bar .btn:hover:not(:disabled),
.feedback-overlay .btn:hover:not(:disabled),
.g3-completion .btn-primary:hover:not(:disabled) {
  background: linear-gradient(135deg, hsla(260,68%,50%,0.92), hsla(238,58%,44%,0.92));
  border-color: hsla(260,58%,60%,0.68);
  box-shadow: 0 0 30px hsla(260,58%,52%,0.4), 0 0 52px hsla(260,48%,42%,0.22);
  transform: translateY(-1px);
}
.g3-intro__cta:disabled,
.g3-stage__bar .btn:disabled,
.feedback-overlay .btn:disabled,
.g3-completion .btn-primary:disabled {
  background: hsla(240,18%,16%,0.5);
  border-color: hsla(240,14%,24%,0.3);
  color: hsla(240,12%,42%,0.45);
  box-shadow: none;
  transform: none;
}

/* --- 次要按钮（完成页"返回首页"） --- */
.g3-completion .btn-secondary {
  background: hsla(240,30%,12%,0.55);
  border: 1px solid hsla(260,28%,38%,0.4);
  color: hsla(240,22%,80%,0.85);
  box-shadow: 0 0 14px hsla(260,30%,28%,0.12);
  backdrop-filter: blur(8px);
  border-radius: var(--radius-md);
  font-weight: 500;
}
.g3-completion .btn-secondary:hover:not(:disabled) {
  background: hsla(240,35%,16%,0.6);
  border-color: hsla(260,35%,45%,0.5);
  box-shadow: 0 0 20px hsla(260,35%,35%,0.2);
  color: hsla(240,25%,88%,0.95);
}

/* --- 阶段一 池 & 区 边框增强 --- */
.g3-pool {
  border-color: hsla(260,38%,38%,0.5);
  box-shadow: 0 0 32px hsla(260,35%,25%,0.18), inset 0 0 32px hsla(260,32%,8%,0.08);
}
.g3-pool--drag-over {
  border-color: hsla(260,58%,55%,0.72);
  box-shadow: 0 0 40px hsla(260,52%,42%,0.3), inset 0 0 28px hsla(260,40%,12%,0.12);
}

.g3-zone--green {
  border-color: hsla(160,58%,34%,0.52);
  box-shadow: 0 0 22px hsla(160,42%,26%,0.16), inset 0 0 22px hsla(160,35%,6%,0.06);
}
.g3-zone--yellow {
  border-color: hsla(42,58%,38%,0.52);
  box-shadow: 0 0 22px hsla(42,42%,26%,0.16), inset 0 0 22px hsla(42,35%,6%,0.06);
}
.g3-zone--red {
  border-color: hsla(0,42%,36%,0.52);
  box-shadow: 0 0 22px hsla(0,32%,24%,0.14), inset 0 0 22px hsla(0,28%,6%,0.06);
}

/* 拖拽悬停高亮增强 */
.g3-zone--green.g3-zone--drag-over  { border-color: hsla(160,65%,48%,0.78); box-shadow: 0 0 34px hsla(160,58%,42%,0.26), inset 0 0 24px hsla(160,40%,10%,0.1); }
.g3-zone--yellow.g3-zone--drag-over { border-color: hsla(42,60%,50%,0.78); box-shadow: 0 0 34px hsla(42,58%,42%,0.26), inset 0 0 24px hsla(42,40%,10%,0.1); }
.g3-zone--red.g3-zone--drag-over    { border-color: hsla(0,52%,44%,0.78); box-shadow: 0 0 34px hsla(0,48%,38%,0.22), inset 0 0 24px hsla(0,32%,10%,0.1); }
</style>
</head>
<body>

<div class="game-container" id="js-game-root">
  <p style="text-align:center;color:var(--color-text-muted);padding:var(--space-12);">加载中...</p>
</div>

<script type="module">
// ============================================================
// G3 游戏页面（两阶段编排 + 计算流水线）
// ============================================================

  import { FRAGMENTS, FRAGMENT_DIMENSIONS, GROUPS, RANK_WEIGHTS, FEEDBACK_TEXT, GAME_CONFIG } from '../js/games/game3-data.js?v=20260603a';
  import { FocusSortStrategy } from '../js/games/strategies/focus-sort.js?v=20260603a';
  import { save } from '../js/core/store.js?v=20260603a';
  import { clamp } from '../js/core/utils.js?v=20260603a';

// ---------- 编排器 ----------

async function run() {
  const root = document.getElementById('js-game-root');
  const startTime = performance.now();
  let stage1Time = 0;

  // Phase 0: 引导页（星空叙事）
  await FocusSortStrategy.renderIntro(root, GAME_CONFIG);

  // Phase 1: 阶段一 — 三组归类
  const s1Start = performance.now();
  const groups = await FocusSortStrategy.renderStage1(root, FRAGMENTS);
  stage1Time = Math.round(performance.now() - s1Start);

  // 记录阶段一决策
  const decisions1 = FRAGMENTS.map(f => ({
    stage: 1,
    cardId: f.id,
    group: groups[f.id],
    groupLabel: GROUPS.find(g => g.key === groups[f.id])?.label || '',
  }));

  // 阶段一反馈
  await FocusSortStrategy.renderFeedback(root, FEEDBACK_TEXT.stage1);

  // Phase 2: 阶段二 — 🟢组精排
  const greenIds = FRAGMENTS.filter(f => groups[f.id] === 'green').map(f => f.id);
  let stage2Time = 0;
  let decisions2 = [];
  let rankMap = {};

  if (greenIds.length >= 2) {
    const s2Start = performance.now();
    const sortedIds = await FocusSortStrategy.renderStage2(root, greenIds, FRAGMENTS);
    stage2Time = Math.round(performance.now() - s2Start);

    sortedIds.forEach((id, i) => {
      rankMap[id] = i + 1;
      decisions2.push({ stage: 2, cardId: id, rank: i + 1 });
    });
  }
  // 🟢组只有1张：跳过阶段二，直接赋值 rank=1
  if (greenIds.length === 1) {
    rankMap[greenIds[0]] = 1;
    decisions2.push({ stage: 2, cardId: greenIds[0], rank: 1 });
  }

  // Phase 3: 计算流水线

  // 3a. 每碎片总分 = 阶段一分 + 阶段二额外分
  const fragmentScores = {};
  FRAGMENTS.forEach(f => {
    const s1Score = GROUPS.find(g => g.key === groups[f.id])?.score || 0;
    const rank = rankMap[f.id] || 0;
    const s2Bonus = rank > 0 ? (RANK_WEIGHTS[rank - 1] || 0) : 0;
    fragmentScores[f.id] = s1Score + s2Bonus;
  });

  // 3b. MBTI 原始得分（主导权重×1.0 + 辅助权重×0.5）
  const rawMBTI = { S:0, N:0, T:0, F:0, E:0, I:0, J:0, P:0 };
  FRAGMENTS.forEach(f => {
    const score = fragmentScores[f.id];
    rawMBTI[f.primary] += score;
    rawMBTI[f.secondary] += score * 0.5;
  });

  // 3c. MBTI 归一化 [-10, +10] × 4对
  function normDiff(a, b) {
    return clamp((rawMBTI[a] - rawMBTI[b]) / 5 * 10, -10, 10);
  }
  const mbti = {
    E: normDiff('E', 'I'), I: -normDiff('E', 'I'),
    S: normDiff('S', 'N'), N: -normDiff('S', 'N'),
    T: normDiff('T', 'F'), F: -normDiff('T', 'F'),
    J: normDiff('J', 'P'), P: -normDiff('J', 'P'),
  };

  // 3d. MBTI → wholistAnalytic
  const sn = mbti.S / 10;  // S(+)=分析, N(-)=整体
  const tf = mbti.T / 10;  // T(+)=分析, F(-)=整体
  const jp = mbti.J / 10;  // J(+)=分析, P(-)=整体
  const wholistAnalytic = clamp(sn * 0.5 + tf * 0.3 + jp * 0.2, -1, 1);

  // 3e. behaviorSummary
  let dominantStyle;
  if (wholistAnalytic < -0.3) dominantStyle = '整体型';
  else if (wholistAnalytic > 0.3) dominantStyle = '分析型';
  else dominantStyle = '平衡型';

  const flexibility = Math.max(0, -mbti.J);  // P倾向 [0,10]
  const avgStage1Time = stage1Time / 8;
  const impulseScore = clamp(10 - (avgStage1Time / 1000) * 2, 0, 10); // 快=高冲动

  // Phase 4: 构造输出
  const totalTime = Math.round(performance.now() - startTime);
  const output = {
    gameId: 'game3',
    version: '1.0.0',
    dimensions: { wholistAnalytic },
    behaviorSummary: { dominantStyle, flexibility, impulseScore },
    mbtiIntermediate: mbti,
    decisions: [...decisions1, ...decisions2],
    meta: {
      stage1Time, stage2Time,
      greenCount: Object.values(groups).filter(v => v === 'green').length,
      yellowCount: Object.values(groups).filter(v => v === 'yellow').length,
      redCount: Object.values(groups).filter(v => v === 'red').length,
      totalTime, elapsedMs: totalTime, decisionCount: decisions1.length + decisions2.length,
      completedAt: Date.now(),
    },
  };

  // 保存
  try {
    save('game3', output);
    console.log('[G3] 结果已保存', output);
  } catch (err) {
    console.error('[G3] 保存失败:', err);
  }

  // Phase 5: 完成页
  await FocusSortStrategy.renderCompletion(root, output, GAME_CONFIG);
}

// 启动
run().catch(err => {
  console.error('[G3] 运行时错误:', err);
  document.getElementById('js-game-root').innerHTML =
    `<p style="color:var(--color-error);text-align:center;padding:var(--space-12);">出错了：${err.message}</p>`;
});
</script>

</body>
</html>
