<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>MindMatch — 行为叙事管道验证</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0f0; min-height: 100vh; padding: 40px 20px; }
    h1 { text-align: center; font-size: 22px; margin-bottom: 8px; }
    .subtitle { text-align: center; font-size: 13px; color: #6b6b80; margin-bottom: 32px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; max-width: 960px; margin: 0 auto; }
    .card { background: #1a1a2e; border: 1px solid #2a2a40; border-radius: 12px; padding: 20px; cursor: pointer; transition: border-color .2s, transform .1s; }
    .card:hover { border-color: #7c3aed; transform: translateY(-1px); }
    .card h2 { font-size: 17px; margin-bottom: 4px; }
    .card .label { font-size: 11px; color: #7c3aed; font-weight: 600; letter-spacing: .05em; margin-bottom: 10px; text-transform: uppercase; }
    .card .desc { font-size: 12px; color: #999; line-height: 1.6; }
    .tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; margin: 2px; }
    .tag-orange { background: #3d2a10; color: #f0a040; }
    .tag-blue { background: #102a3d; color: #40a0f0; }
    .tag-green { background: #102d1a; color: #40d070; }
    .tag-purple { background: #1d103d; color: #a060f0; }
    .footer { text-align: center; margin-top: 32px; font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <h1>行为叙事管道验证</h1>
  <p class="subtitle">选择一个合成用户，注入完整游戏数据，跳转结果页验证 AI 叙事质量</p>
  <div class="grid" id="grid"></div>
  <div id="result-link" style="text-align:center;margin-top:24px"></div>
  <p class="footer">点击卡片注入数据 → 点击按钮跳转 results.html → 控制台查看行为叙事提取日志</p>

  <script>
    const PROFILES = [
      {
        id: 'intuitive-fast',
        label: '直觉型快速决策者',
        behaviorTags: ['G1:直觉型(1.4s)', 'G2:目标型(翻6选6)', 'G3:直觉型(impulse 8)', 'G4:深度内化'],
        desc: '秒选型玩家，不纠结。G2几乎不翻卡直接选，G3快速分组但排序慢，G4临在感来很快但追寻意义时慎重。',
        behaviors: buildFastIntuitive(),
      },
      {
        id: 'deliberate-slow',
        label: '审慎型慢速决策者',
        behaviorTags: ['G1:审慎型(5.2s)', 'G2:探索型(翻13选6)', 'G3:审慎型(impulse 3)', 'G4:搜寻型'],
        desc: '每道题都想很久。G2全翻一遍精挑细选，G3分组和排序都很慢，G4不太容易有临在感但一旦有很快找到方向。',
        behaviors: buildSlowDeliberate(),
      },
      {
        id: 'balanced-explorer',
        label: '均衡探索型',
        behaviorTags: ['G1:均衡型(2.6s)', 'G2:探索型(翻11选6)', 'G3:均衡型(impulse 5)', 'G4:平衡型'],
        desc: '不疾不徐，有节奏感。G2翻了一半多，G3分组排序节奏均衡，G4临在和追寻同步。',
        behaviors: buildBalancedExplorer(),
      },
      {
        id: 'high-variance',
        label: '高波动矛盾型',
        behaviorTags: ['G1:审慎型(3.8s 高波动)', 'G2:目标型(翻5选6)', 'G3:审慎型(impulse 3.5)', 'G4:成长型'],
        desc: '决策风格矛盾——有的题秒选有的题想很久(variance 3.2)。G2极简不翻卡但G3反复推敲。',
        behaviors: buildHighVariance(),
      },
    ];

    function buildFastIntuitive() {

      return {
        game1: { gameId:'game1', version:'1.0.0', dimensions:{ nAch:8.2, nPow:3.5, nAff:4.1 }, decisions:[{ scenarioId:'s1', chosenOptionId:'s1_a', decisionTime:920 },{ scenarioId:'s2', chosenOptionId:'s2_b', decisionTime:1340 },{ scenarioId:'s3', chosenOptionId:'s3_a', decisionTime:810 },{ scenarioId:'s4', chosenOptionId:'s4_d', decisionTime:1580 },{ scenarioId:'s5', chosenOptionId:'s5_c', decisionTime:1100 }], meta:{ totalTime:6140, elapsedMs:45000, decisionCount:5, scenarioIds:['s1','s2','s3','s4','s5'], completedAt:now } },
        game2: { gameId:'game2', version:'1.0.0', dimensions:{ TF:9.0, GM:5.0, AU:4.0, SE:3.5, EC:6.0, SV:2.5, CH:5.5, LS:4.5 }, behaviorSummary:{ primaryAnchor:'TF', secondaryAnchor:'EC', bottomAnchor:'SV' }, decisions:[ { stage:1, cardId:'c1', action:'join', anchor:'TF' },{ stage:1, cardId:'c3', action:'join', anchor:'TF' },{ stage:1, cardId:'c9', action:'join', anchor:'EC' },{ stage:1, cardId:'c10', action:'join', anchor:'EC' },{ stage:1, cardId:'c5', action:'join', anchor:'GM' },{ stage:1, cardId:'c6', action:'join', anchor:'GM' },{ stage:1, cardId:'c2', action:'pass', anchor:'AU' },{ stage:1, cardId:'c4', action:'pass', anchor:'AU' },{ stage:1, cardId:'c7', action:'pass', anchor:'SE' },{ stage:1, cardId:'c8', action:'pass', anchor:'SE' },{ stage:1, cardId:'c11', action:'pass', anchor:'SV' },{ stage:1, cardId:'c12', action:'pass', anchor:'SV' },{ stage:1, cardId:'c13', action:'pass', anchor:'CH' },{ stage:1, cardId:'c14', action:'pass', anchor:'CH' },{ stage:1, cardId:'c15', action:'pass', anchor:'LS' },{ stage:1, cardId:'c16', action:'pass', anchor:'LS' } ], meta:{ totalTime:38000, elapsedMs:38000, decisionCount:16, cardsFlipped:6, stage1Kept:6, stage2Kept:4, stage3Kept:2, completedAt:now } },
        game3: { gameId:'game3', version:'1.0.0', dimensions:{ wholistAnalytic:-0.2 }, behaviorSummary:{ dominantStyle:'整体型', flexibility:5.5, impulseScore:8.0 }, decisions:[ { stage:1, cardId:'f1', group:'green', groupLabel:'很像我' },{ stage:1, cardId:'f2', group:'green', groupLabel:'很像我' },{ stage:1, cardId:'f3', group:'yellow', groupLabel:'有点像' },{ stage:1, cardId:'f4', group:'green', groupLabel:'很像我' },{ stage:1, cardId:'f5', group:'yellow', groupLabel:'有点像' },{ stage:1, cardId:'f6', group:'red', groupLabel:'不像我' },{ stage:1, cardId:'f7', group:'green', groupLabel:'很像我' },{ stage:1, cardId:'f8', group:'red', groupLabel:'不像我' } ], mbtiIntermediate:{ E:3, I:-3, S:-2, N:2, T:1, F:-1, J:0, P:0 }, meta:{ stage1Time:12000, stage2Time:14000, greenCount:4, yellowCount:2, redCount:2, totalTime:26000, elapsedMs:52000, decisionCount:8, completedAt:now } },

      };
    }

    function buildSlowDeliberate() {
      const now = Date.now();
      return {
        game1: { gameId:'game1', version:'1.0.0', dimensions:{ nAch:6.5, nPow:7.2, nAff:5.0 }, decisions:[ { scenarioId:'s1', chosenOptionId:'s1_b', decisionTime:6200 },{ scenarioId:'s2', chosenOptionId:'s2_a', decisionTime:5100 },{ scenarioId:'s3', chosenOptionId:'s3_c', decisionTime:5800 },{ scenarioId:'s4', chosenOptionId:'s4_a', decisionTime:7100 },{ scenarioId:'s5', chosenOptionId:'s5_a', decisionTime:4400 } ], meta:{ totalTime:28600, elapsedMs:58000, decisionCount:5, scenarioIds:['s1','s2','s3','s4','s5'], completedAt:now } },
        game2: { gameId:'game2', version:'1.0.0', dimensions:{ TF:7.5, GM:5.5, AU:4.0, SE:3.0, EC:4.5, SV:6.0, CH:4.0, LS:5.5 }, behaviorSummary:{ primaryAnchor:'TF', secondaryAnchor:'SV', bottomAnchor:'SE' }, decisions:[ { stage:1, cardId:'c1', action:'join', anchor:'TF' },{ stage:1, cardId:'c3', action:'join', anchor:'TF' },{ stage:1, cardId:'c11', action:'join', anchor:'SV' },{ stage:1, cardId:'c12', action:'join', anchor:'SV' },{ stage:1, cardId:'c5', action:'join', anchor:'GM' },{ stage:1, cardId:'c16', action:'join', anchor:'LS' },{ stage:1, cardId:'c2', action:'pass', anchor:'AU' },{ stage:1, cardId:'c4', action:'pass', anchor:'AU' },{ stage:1, cardId:'c6', action:'pass', anchor:'GM' },{ stage:1, cardId:'c7', action:'pass', anchor:'SE' },{ stage:1, cardId:'c8', action:'pass', anchor:'SE' },{ stage:1, cardId:'c9', action:'pass', anchor:'EC' },{ stage:1, cardId:'c10', action:'pass', anchor:'EC' },{ stage:1, cardId:'c13', action:'pass', anchor:'CH' },{ stage:1, cardId:'c14', action:'pass', anchor:'CH' },{ stage:1, cardId:'c15', action:'pass', anchor:'LS' } ], meta:{ totalTime:72000, elapsedMs:72000, decisionCount:16, cardsFlipped:13, stage1Kept:6, stage2Kept:4, stage3Kept:2, completedAt:now } },
        game3: { gameId:'game3', version:'1.0.0', dimensions:{ wholistAnalytic:0.45 }, behaviorSummary:{ dominantStyle:'分析型', flexibility:4.0, impulseScore:3.0 }, decisions:[ { stage:1, cardId:'f1', group:'green', groupLabel:'很像我' },{ stage:1, cardId:'f3', group:'yellow', groupLabel:'有点像' },{ stage:1, cardId:'f5', group:'green', groupLabel:'很像我' },{ stage:1, cardId:'f7', group:'yellow', groupLabel:'有点像' },{ stage:1, cardId:'f2', group:'red', groupLabel:'不像我' },{ stage:1, cardId:'f4', group:'red', groupLabel:'不像我' },{ stage:1, cardId:'f6', group:'yellow', groupLabel:'有点像' },{ stage:1, cardId:'f8', group:'green', groupLabel:'很像我' } ], mbtiIntermediate:{ E:-2, I:2, S:3, N:-3, T:4, F:-4, J:2, P:-2 }, meta:{ stage1Time:28000, stage2Time:12000, greenCount:3, yellowCount:3, redCount:2, totalTime:40000, elapsedMs:65000, decisionCount:8, completedAt:now } },
        game4: { gameId:'game4', version:'1.0.0', dimensions:{ presence:4.5, search:7.0 }, behaviorSummary:{ profileType:'探索型' }, decisions:[ { scenarioId:'s1', reactionPresence:'s1_pB', reactionSearch:'s1_sA', reactionTimeMs:5600, reactionOneMs:3800, reactionTwoMs:1800 },{ scenarioId:'s2', reactionPresence:'s2_pB', reactionSearch:'s2_sA', reactionTimeMs:4800, reactionOneMs:3200, reactionTwoMs:1600 },{ scenarioId:'s3', reactionPresence:'s3_pA', reactionSearch:'s3_sA', reactionTimeMs:5200, reactionOneMs:3400, reactionTwoMs:1800 },{ scenarioId:'s4', reactionPresence:'s4_pB', reactionSearch:'s4_sA', reactionTimeMs:6100, reactionOneMs:4200, reactionTwoMs:1900 },{ scenarioId:'s5', reactionPresence:'s5_pB', reactionSearch:'s5_sA', reactionTimeMs:4500, reactionOneMs:2900, reactionTwoMs:1600 },{ scenarioId:'s6', reactionPresence:'s6_pA', reactionSearch:'s6_sB', reactionTimeMs:3800, reactionOneMs:2600, reactionTwoMs:1200 } ], meta:{ totalTime:29800, elapsedMs:72000, reactionCount:6, avgReactionTimeMs:5000, completedAt:now } },
      };
    }

      return {

        game2: { gameId:'game2', version:'1.0.0', dimensions:{ GM:8.0, AU:7.5, TF:4.0, SE:4.5, EC:7.0, SV:3.5, CH:5.0, LS:6.0 }, behaviorSummary:{ primaryAnchor:'GM', secondaryAnchor:'AU', bottomAnchor:'SV' }, decisions:[ { stage:1, cardId:'c5', action:'join', anchor:'GM' },{ stage:1, cardId:'c6', action:'join', anchor:'GM' },{ stage:1, cardId:'c2', action:'join', anchor:'AU' },{ stage:1, cardId:'c4', action:'join', anchor:'AU' },{ stage:1, cardId:'c9', action:'join', anchor:'EC' },{ stage:1, cardId:'c16', action:'join', anchor:'LS' },{ stage:1, cardId:'c1', action:'pass', anchor:'TF' },{ stage:1, cardId:'c3', action:'pass', anchor:'TF' },{ stage:1, cardId:'c7', action:'pass', anchor:'SE' },{ stage:1, cardId:'c8', action:'pass', anchor:'SE' },{ stage:1, cardId:'c10', action:'pass', anchor:'EC' },{ stage:1, cardId:'c11', action:'pass', anchor:'SV' },{ stage:1, cardId:'c12', action:'pass', anchor:'SV' },{ stage:1, cardId:'c13', action:'pass', anchor:'CH' },{ stage:1, cardId:'c14', action:'pass', anchor:'CH' },{ stage:1, cardId:'c15', action:'pass', anchor:'LS' } ], meta:{ totalTime:55000, elapsedMs:55000, decisionCount:16, cardsFlipped:11, stage1Kept:6, stage2Kept:4, stage3Kept:2, completedAt:now } },
        game3: { gameId:'game3', version:'1.0.0', dimensions:{ wholistAnalytic:-0.1 }, behaviorSummary:{ dominantStyle:'平衡型', flexibility:6.5, impulseScore:5.0 }, decisions:[ { stage:1, cardId:'f1', group:'green', groupLabel:'很像我' },{ stage:1, cardId:'f2', group:'green', groupLabel:'很像我' },{ stage:1, cardId:'f3', group:'yellow', groupLabel:'有点像' },{ stage:1, cardId:'f4', group:'yellow', groupLabel:'有点像' },{ stage:1, cardId:'f5', group:'green', groupLabel:'很像我' },{ stage:1, cardId:'f6', group:'red', groupLabel:'不像我' },{ stage:1, cardId:'f7', group:'red', groupLabel:'不像我' },{ stage:1, cardId:'f8', group:'yellow', groupLabel:'有点像' } ], mbtiIntermediate:{ E:1, I:-1, S:0, N:0, T:1, F:-1, J:-2, P:2 }, meta:{ stage1Time:18000, stage2Time:15000, greenCount:3, yellowCount:3, redCount:2, totalTime:33000, elapsedMs:60000, decisionCount:8, completedAt:now } },
        game4: { gameId:'game4', version:'1.0.0', dimensions:{ presence:6.0, search:6.5 }, behaviorSummary:{ profileType:'成长型' }, decisions:[ { scenarioId:'s1', reactionPresence:'s1_pA', reactionSearch:'s1_sA', reactionTimeMs:4000, reactionOneMs:2000, reactionTwoMs:2000 },{ scenarioId:'s2', reactionPresence:'s2_pA', reactionSearch:'s2_sA', reactionTimeMs:3800, reactionOneMs:1900, reactionTwoMs:1900 },{ scenarioId:'s3', reactionPresence:'s3_pA', reactionSearch:'s3_sB', reactionTimeMs:4200, reactionOneMs:2100, reactionTwoMs:2100 },{ scenarioId:'s4', reactionPresence:'s4_pB', reactionSearch:'s4_sA', reactionTimeMs:3500, reactionOneMs:1700, reactionTwoMs:1800 },{ scenarioId:'s5', reactionPresence:'s5_pA', reactionSearch:'s5_sA', reactionTimeMs:3600, reactionOneMs:1800, reactionTwoMs:1800 },{ scenarioId:'s6', reactionPresence:'s6_pA', reactionSearch:'s6_sB', reactionTimeMs:4400, reactionOneMs:2200, reactionTwoMs:2200 } ], meta:{ totalTime:23500, elapsedMs:68000, reactionCount:6, avgReactionTimeMs:3916, completedAt:now } },
      };
    }

    function buildHighVariance() {
      const now = Date.now();
      return {
        game1: { gameId:'game1', version:'1.0.0', dimensions:{ nAch:5.0, nPow:8.5, nAff:3.0 }, decisions:[ { scenarioId:'s1', chosenOptionId:'s1_b', decisionTime:7200 },{ scenarioId:'s2', chosenOptionId:'s2_a', decisionTime:1100 },{ scenarioId:'s3', chosenOptionId:'s3_b', decisionTime:5800 },{ scenarioId:'s4', chosenOptionId:'s4_c', decisionTime:950 },{ scenarioId:'s5', chosenOptionId:'s5_a', decisionTime:3900 } ], meta:{ totalTime:18950, elapsedMs:52000, decisionCount:5, scenarioIds:['s1','s2','s3','s4','s5'], completedAt:now } },
        game2: { gameId:'game2', version:'1.0.0', dimensions:{ GM:8.5, LS:7.0, AU:6.5, EC:5.5, TF:4.0, SE:3.5, SV:3.0, CH:4.5 }, behaviorSummary:{ primaryAnchor:'GM', secondaryAnchor:'LS', bottomAnchor:'SV' }, decisions:[ { stage:1, cardId:'c5', action:'join', anchor:'GM' },{ stage:1, cardId:'c6', action:'join', anchor:'GM' },{ stage:1, cardId:'c15', action:'join', anchor:'LS' },{ stage:1, cardId:'c16', action:'join', anchor:'LS' },{ stage:1, cardId:'c2', action:'join', anchor:'AU' },{ stage:1, cardId:'c4', action:'join', anchor:'AU' },{ stage:1, cardId:'c1', action:'pass', anchor:'TF' },{ stage:1, cardId:'c3', action:'pass', anchor:'TF' },{ stage:1, cardId:'c7', action:'pass', anchor:'SE' },{ stage:1, cardId:'c8', action:'pass', anchor:'SE' },{ stage:1, cardId:'c9', action:'pass', anchor:'EC' },{ stage:1, cardId:'c10', action:'pass', anchor:'EC' },{ stage:1, cardId:'c11', action:'pass', anchor:'SV' },{ stage:1, cardId:'c12', action:'pass', anchor:'SV' },{ stage:1, cardId:'c13', action:'pass', anchor:'CH' },{ stage:1, cardId:'c14', action:'pass', anchor:'CH' } ], meta:{ totalTime:28000, elapsedMs:28000, decisionCount:16, cardsFlipped:5, stage1Kept:6, stage2Kept:4, stage3Kept:2, completedAt:now } },
        game3: { gameId:'game3', version:'1.0.0', dimensions:{ wholistAnalytic:0.30 }, behaviorSummary:{ dominantStyle:'分析型', flexibility:3.5, impulseScore:3.5 }, decisions:[ { stage:1, cardId:'f1', group:'green', groupLabel:'很像我' },{ stage:1, cardId:'f3', group:'green', groupLabel:'很像我' },{ stage:1, cardId:'f5', group:'yellow', groupLabel:'有点像' },{ stage:1, cardId:'f7', group:'yellow', groupLabel:'有点像' },{ stage:1, cardId:'f2', group:'red', groupLabel:'不像我' },{ stage:1, cardId:'f4', group:'red', groupLabel:'不像我' },{ stage:1, cardId:'f6', group:'yellow', groupLabel:'有点像' },{ stage:1, cardId:'f8', group:'green', groupLabel:'很像我' } ], mbtiIntermediate:{ E:-3, I:3, S:2, N:-2, T:5, F:-5, J:3, P:-3 }, meta:{ stage1Time:25000, stage2Time:20000, greenCount:3, yellowCount:3, redCount:2, totalTime:45000, elapsedMs:70000, decisionCount:8, completedAt:now } },
        game4: { gameId:'game4', version:'1.0.0', dimensions:{ presence:7.0, search:8.0 }, behaviorSummary:{ profileType:'成长型' }, decisions:[ { scenarioId:'s1', reactionPresence:'s1_pA', reactionSearch:'s1_sA', reactionTimeMs:3500, reactionOneMs:2200, reactionTwoMs:1300 },{ scenarioId:'s2', reactionPresence:'s2_pB', reactionSearch:'s2_sA', reactionTimeMs:5200, reactionOneMs:3800, reactionTwoMs:1400 },{ scenarioId:'s3', reactionPresence:'s3_pA', reactionSearch:'s3_sA', reactionTimeMs:4100, reactionOneMs:2600, reactionTwoMs:1500 },{ scenarioId:'s4', reactionPresence:'s4_pA', reactionSearch:'s4_sA', reactionTimeMs:3800, reactionOneMs:2400, reactionTwoMs:1400 },{ scenarioId:'s5', reactionPresence:'s5_pB', reactionSearch:'s5_sA', reactionTimeMs:4900, reactionOneMs:3400, reactionTwoMs:1500 },{ scenarioId:'s6', reactionPresence:'s6_pA', reactionSearch:'s6_sB', reactionTimeMs:4400, reactionOneMs:2900, reactionTwoMs:1500 } ], meta:{ totalTime:26000, elapsedMs:65000, reactionCount:6, avgReactionTimeMs:4316, completedAt:now } },
      };
    }

    // 渲染卡片
    const grid = document.getElementById('grid');
    PROFILES.forEach((p, idx) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <h2>${idx + 1}. ${p.label}</h2>
        <div class="label">${p.id}</div>
        <div style="margin-bottom:10px">${p.behaviorTags.map(t => `<span class="tag ${t.includes('直觉')||t.includes('冲动')?'tag-orange':t.includes('探索')?'tag-blue':t.includes('均衡')?'tag-green':'tag-purple'}">${t}</span>`).join(' ')}</div>
        <div class="desc">${p.desc}</div>
      `;
      card.addEventListener('click', () => inject(p));
      grid.appendChild(card);
    });

    function inject(profile) {
      const PREFIX = 'mindmatch_';
      const games = profile.behaviors;
      Object.entries(games).forEach(([gameId, data]) => {
        localStorage.setItem(PREFIX + gameId, JSON.stringify(data));
      });
      // 写入 meta，否则 store.hasAll() 和 completedCount() 拿不到数据
      localStorage.setItem(PREFIX + 'meta', JSON.stringify({
        userId: null,
        completedGames: ['game1', 'game2', 'game3', 'game4'],
      }));
      console.log(`[Inject] 已注入 ${profile.label} 的完整数据（4 游戏 + meta）`);
      // 渲染结果链接
      document.getElementById('result-link').innerHTML = `
        <p style="color:#40d070;font-size:13px">✓ ${profile.label} 数据已注入 localStorage</p>
        <a href="./results.html" style="display:inline-block;margin-top:8px;padding:8px 20px;background:#7c3aed;color:white;border-radius:6px;text-decoration:none;font-size:13px">→ 打开 results.html 验证 AI 解读</a>
      `;
    }
  </script>
</body>
</html>
