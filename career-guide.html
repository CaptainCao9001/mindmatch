<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindMatch — 职业方向探索</title>
  <meta name="description" content="通过引导式 AI 对话，探索你的职业方向。结合测评画像，给出个性化的发展建议。">

  <link rel="stylesheet" href="css/base.css?v=20260603g">
  <link rel="stylesheet" href="css/components.css?v=20260603g">

</head>
<body style="margin:0;background:#0d0d12;">

<!-- Demo 提示 -->
<div style="
  width:100%;padding:8px;text-align:center;
  background:hsla(48,100%,50%,0.13);
  border-bottom:1px solid hsla(48,100%,50%,0.25);
  color:hsl(48,100%,52%);
  font-size:14px;
  font-weight:500;
  letter-spacing:.03em;
  font-family:system-ui,-apple-system,sans-serif;
">🛠 开发中 Demo · 结果仅供体验参考，不构成专业建议</div>

<main class="page-career-guide">

  <!-- ========== Top Nav ========== -->
  <nav class="cg-nav">
    <a href="index.html">
      <svg viewBox="0 0 24 24" width="16" height="16"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      返回首页
    </a>
  </nav>

  <!-- ========== Hero (minimal) ========== -->
  <section class="cg-hero">
    <h1><span class="cg-hero-icon">🧭</span>职业方向探索</h1>
    <p class="cg-hero-tagline">通过一场走心的对话，帮你理清方向</p>
  </section>

  <!-- ========== Intro Section ========== -->
  <section class="cg-intro" id="intro-section">
    <div class="cg-intro-card">
      <span class="cg-intro-icon">🧭</span>
      <h2>职业方向探索</h2>
      <p>接下来我会通过几个关键问题了解你的现状和期待。不考知识，没有标准答案——你只需要说出真实的想法。</p>

      <div class="cg-meta">
        <div class="cg-meta-item"><span>⏱</span> 3-5分钟</div>
        <div class="cg-meta-item"><span>📋</span> 5-6个问题</div>
        <div class="cg-meta-item"><span>💡</span> 如有测评更快</div>
      </div>

      <div id="intro-profile-hint" class="cg-hidden">
        <div class="cg-profile-hint">✅ 检测到你已完成测评，对话会更精准</div>
      </div>

      <button class="cg-start-btn" id="btn-start">
        开始探索
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>

  <!-- ========== Chat Container ========== -->

    <!-- Progress -->
    <div class="cg-progress" id="progress-bar"></div>

    <div class="cg-messages" id="chat-messages"></div>

    <!-- Input Area -->
    <div class="cg-input-area">
      <textarea

        id="chat-input"
        placeholder="输入你的回答…（Shift+Enter 换行）"

  <div class="cg-footer">

<!-- ========== App Script ========== -->
<script type="module">
  import { ChatRenderer } from './js/agent/chat-renderer.js';
  import { sendToAgent, executeToolCalls } from './js/agent/tool-executor.js';

  // ---------- Agent 状态（最小化前端状态） ----------
  let sessionId = null;          // Agent 会话 ID
  let agentPhase = 1;           // 当前阶段号（来自 agent）
  let agentLabel = '现状了解';   // 阶段标签
  let isProcessing = false;
  const introSection = document.getElementById('intro-section');
  const introProfileHint = document.getElementById('intro-profile-hint');
  const btnStart = document.getElementById('btn-start');
  const chatContainer = document.getElementById('chat-container');
  const chatMessages = document.getElementById('chat-messages');
  const chatInput = document.getElementById('chat-input');
  const btnSend = document.getElementById('btn-send');
  const progressBar = document.getElementById('progress-bar');
  const resultPanel = document.getElementById('result-panel');

  // ---------- 核心实例 ----------
  let renderer = null; // ChatRenderer

  // ---------- 初始化 ----------
  async function init() {
    renderer = new ChatRenderer(chatMessages, chatInput, btnSend, progressBar);

    // 检测是否有测评画像
    const hasProfile = await checkProfile();
    if (hasProfile) {
      introProfileHint.classList.remove('cg-hidden');
    }

    // 绑定发送
    renderer.onSend(handleUserInput);

    // 绑定开始按钮
    btnStart.addEventListener('click', () => {
      showChat();
      startConversation();
    });
  }

  function showChat() {
    introSection.classList.add('cg-hidden');
    chatContainer.classList.remove('cg-hidden');
  }

  // ---------- 检查本地画像 ----------
  async function checkProfile() {
    try {
      const { hasAllGameData } = await import('./js/core/store.js');
      return hasAllGameData();
    } catch { return false; }
  }

  // ---------- 开始对话 ----------
  async function startConversation() {
    renderer.showThinking();
    renderer.showProgress(1, 7, '现状了解');

    try {
      const hasProfile = await checkProfile();
      const res = await sendToAgent(null, '你好，我想探索自己的职业方向', hasProfile ? 'with_profile' : null);
      sessionId = res.sessionId;

      renderer.hideThinking();

      if (res.reply) {
        renderer.addMessage('assistant', res.reply);
      }

      if (res.toolCalls) {
        executeToolCalls(res.toolCalls, renderer);
      }

      agentPhase = res.phase || 1;
      agentLabel = res.label || '现状了解';
      renderer.showProgress(agentPhase, 7, agentLabel);

    } catch (err) {
      renderer.hideThinking();
      renderer.addMessage('assistant', '你好！我是你的职业方向探索伙伴。接下来我会通过几个关键问题来了解你的现状、经历和期待。准备好了吗？');
      renderer.showError('AI 服务连接中，请稍后刷新重试。');
    }

    renderer.setInputEnabled(true);
    chatInput.focus();
  }

  // ---------- 处理用户输入 ----------
  async function handleUserInput(text) {
    if (isProcessing) return;
    isProcessing = true;
    renderer.setInputEnabled(false);
    renderer.clearInput();
    renderer.addMessage('user', text);
    renderer.showThinking();

    try {
      const res = await sendToAgent(sessionId, text);
      sessionId = res.sessionId || sessionId;

      renderer.hideThinking();

      if (res.reply) {
        renderer.addMessage('assistant', res.reply);
      }

      if (res.toolCalls && res.toolCalls.length > 0) {
        executeToolCalls(res.toolCalls, renderer);
      }

      agentPhase = res.phase || agentPhase;
      agentLabel = res.label || agentLabel;
      renderer.showProgress(agentPhase, 7, agentLabel);

      // 阶段 7 = 生成建议完成
      if (agentPhase >= 7 && res.reply && res.reply.includes('职业方向')) {
        renderer.setInputEnabled(false);
        renderer.addMessage('assistant', '对话已完成。如果需要重新开始，请刷新页面。');
        return;
      }

    } catch (err) {
      renderer.hideThinking();
      console.error('[CareerGuide] Agent 调用失败:', err);
      renderer.showError('抱歉，网络好像出了点问题。请稍后重试。');
    }

    isProcessing = false;
    renderer.setInputEnabled(true);
    chatInput.focus();
  }

  // ---------- 进度更新 ----------
  function updateProgress() {
    renderer.showProgress(agentPhase, 7, agentLabel);
  }

  // ---------- 辅助 ----------
  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  // ========== 启动 ==========
  init();
</script>
</body>
</html>
